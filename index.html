            {isExp&&<div className="mt-4 pt-4 border-t border-gray-100 space-y-2">

                </div>
              )})}
              <div className="p-3 rounded-lg bg-blue-50 border border-blue-100"><div className="flex items-start gap-2"><Icon name="sparkle" size={12} className="text-[#0077C5] mt-0.5"/><p className="text-xs text-blue-800"><strong>AI Insight:</strong> Based on self-assessment and feedback, strongest area in {p.name} is execution velocity. Focus development on cross-team influence for Senior Staff PM.</p></div></div>
            </div>}
          </div>
        )})}
      </div>
    </div>
  );
}

// ============ DEVELOPMENT PLANNER ============

        <div className="grid grid-cols-3 gap-3">{paths.map((p,i)=><div key={i} onClick={()=>setSelPath(i)} className={`p-3 rounded-lg border-2 cursor-pointer transition-all ${selPath===i?'border-teal-500 bg-teal-50':'border-gray-200 hover:border-gray-300'}`}><h3 className="font-semibold text-sm">{p.t}</h3><p className="text-xs text-gray-500 mt-1">{p.tl}</p><div className="flex items-center gap-2 mt-2"><div className="flex-1 bg-gray-200 rounded-full h-2"><div className="bg-teal-500 h-2 rounded-full" style={{width:`${p.r}%`}}/></div><span className="text-xs font-bold">{p.r}%</span></div><div className="flex flex-wrap gap-1 mt-2">{p.f.map((f,fi)=><span key={fi} className="inline-flex px-2 py-0.5 rounded-full text-[10px] font-medium bg-blue-50 text-blue-700">{f}</span>)}</div></div>)}</div>

// ============ AGENT CHAT ============
function AgentChat({ persona }) {
  const [open, setOpen] = useState(false);
  const [minimized, setMinimized] = useState(false);
  const [messages, setMessages] = useState([{role:'assistant',content:persona==='employee'?"Hi Alex! I'm your PM&D Growth Agent. I can help with goals, feedback, 1:1 prep, craft skills, promotion readiness, and development. What would you like?":"Welcome! I'm your Manager Assist co-pilot. I can help with team synthesis, 1:1 prep, feedback drafting, and risk detection."}]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages,typing]);

  const responses = {
    goal: "**4 Active Goals** — 3 on track, 1 at risk.\n\nThe data pipeline goal is at 38%. Recommend:\n1. Break into smaller milestones\n2. Discuss resources in your 1:1\n3. Connect with platform team\n\nAdded to your 1:1 agenda.",
    feedback: "**Key Feedback Themes:**\n\nStrengths: Execution velocity (5 mentions)\nGrowth: Stakeholder communication timing\n\nWant me to draft a response or action plan?",
    promo: "**Promo Readiness: 68% for T5**\n\nStrong: Product Execution (85%), Strategy (72%)\nGaps: Org Effectiveness (55%), Tech Fluency (48%)\n\nRecommend: Lead Q3 cross-BU review.",
    default: "I can help with:\n- Draft goals aligned to craft skills\n- SBI feedback with bias detection\n- 1:1 prep from performance data\n- Promotion readiness assessment\n- Development plans\n\nWhat would you like to explore?"
  };

  const send = () => {
    if (!input.trim()) return;
    setMessages(prev=>[...prev,{role:'user',content:input}]);
    const q=input.toLowerCase(); setInput(''); setTyping(true);
    setTimeout(()=>{
      const r = q.includes('goal')||q.includes('objective')?responses.goal:q.includes('feedback')||q.includes('review')?responses.feedback:q.includes('promo')||q.includes('ready')||q.includes('next level')?responses.promo:responses.default;
      setTyping(false); setMessages(prev=>[...prev,{role:'assistant',content:r}]);
    },1000);
  };

  if (!open) return <button onClick={()=>setOpen(true)} className="fixed bottom-5 right-5 w-12 h-12 rounded-full bg-[#0077C5] text-white shadow-lg flex items-center justify-center hover:bg-blue-700 transition-all hover:scale-105 z-50"><Icon name="bot" size={22}/></button>;

  return (
    <div className={`fixed right-5 bottom-5 bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col z-50 transition-all ${minimized?'w-72 h-12':'w-80 h-[460px]'}`}>
      <div className="flex items-center justify-between px-3 py-2.5 border-b border-gray-100 bg-[#0D2B4E] rounded-t-2xl">
        <div className="flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-[#0077C5] flex items-center justify-center"><Icon name="bot" size={13} className="text-white"/></div><div><p className="text-white text-xs font-semibold">PM&D Agent</p><p className="text-blue-300 text-[9px]">{persona==='employee'?'Employee Assist':'Manager Assist'}</p></div></div>
        <div className="flex items-center gap-0.5"><button onClick={()=>setMinimized(!minimized)} className="p-1 text-blue-300 hover:text-white"><span className="text-sm">{minimized?'□':'—'}</span></button><button onClick={()=>setOpen(false)} className="p-1 text-blue-300 hover:text-white"><Icon name="x" size={13}/></button></div>
      </div>
      {!minimized&&<>
        <div className="flex-1 overflow-y-auto p-3 space-y-2">
          {messages.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[85%] px-3 py-2 rounded-xl text-xs leading-relaxed ${m.role==='user'?'bg-[#0077C5] text-white rounded-br-sm':'bg-gray-100 text-gray-800 rounded-bl-sm'}`}><div className="whitespace-pre-line">{m.content}</div></div></div>)}
          {typing&&<div className="flex justify-start"><div className="bg-gray-100 px-3 py-2 rounded-xl rounded-bl-sm flex gap-1">{[0,1,2].map(d=><span key={d} className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"/>)}</div></div>}
          <div ref={endRef}/>
        </div>
        <div className="px-2 pb-1.5 flex gap-1 flex-wrap">{['My goals','Feedback themes','Promo readiness'].map(q=><button key={q} onClick={()=>setInput(q)} className="px-2 py-0.5 rounded-full text-[10px] font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">{q}</button>)}</div>
        <div className="p-2 border-t border-gray-100"><div className="flex gap-1.5"><input type="text" placeholder="Ask your PM&D Agent..." className="flex-1 px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button onClick={send} className="w-7 h-7 rounded-lg bg-[#0077C5] text-white flex items-center justify-center hover:bg-blue-700"><Icon name="send" size={13}/></button></div></div>
      </>}
    </div>
  );
}

// ============ APP ============
function App() {
  const [page, setPage] = useState('dashboard');
  const [persona, setPersona] = useState('employee');

  const pages = {
    dashboard: <Dashboard persona={persona}/>,
    goals: <GoalsCoach/>,
    feedback: <FeedbackCoach/>,
    checkin: <CheckInPrep/>,
    skills: <CraftSkills/>,
    promotion: <Promotion/>,
    development: <DevPlan/>,
  };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar page={page} setPage={setPage} persona={persona} setPersona={setPersona}/>
      <main className="flex-1 overflow-y-auto">{pages[page]}</main>
      <AgentChat persona={persona}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
