/* ── MARKDOWN RENDERER ── */
function RenderMD({text}) {
  if (!text) return null;
  const lines = text.split('\n');
  const elements = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('### ')) { elements.push(<h3 key={i} className="text-base font-semibold text-intuit-800 mt-4 mb-1">{line.slice(4)}</h3>); }
    else if (line.startsWith('## ')) { elements.push(<h2 key={i} className="text-lg font-semibold text-intuit-800 mt-4 mb-2">{line.slice(3)}</h2>); }
    else if (line.startsWith('# ')) { elements.push(<h1 key={i} className="text-xl font-bold text-intuit-800 mt-4 mb-2">{line.slice(2)}</h1>); }
    else if (line.startsWith('---')) { elements.push(<hr key={i} className="my-3 border-slate-200" />); }
    else if (line.startsWith('- ') || line.startsWith('* ')) {
      const items = [];
      while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
        items.push(<li key={i} className="ml-4 text-sm text-slate-700 leading-relaxed">{formatInline(lines[i].slice(2))}</li>);
        i++;
      }
      elements.push(<ul key={`ul-${i}`} className="list-disc my-1 space-y-0.5">{items}</ul>);
      continue;
    }
    else if (line.startsWith('> ')) { elements.push(<blockquote key={i} className="border-l-3 border-intuit-400 pl-3 my-2 text-sm text-slate-600 italic bg-intuit-50 py-2 rounded-r">{formatInline(line.slice(2))}</blockquote>); }
    else if (line.trim()) { elements.push(<p key={i} className="text-sm text-slate-700 leading-relaxed my-1">{formatInline(line)}</p>); }
    i++;
  }
  return <div>{elements}</div>;
}
function formatInline(t) {
  const parts = [];
  let remaining = t;
  let key = 0;
  while (remaining.length > 0) {
    const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
    const italicMatch = remaining.match(/\*(.+?)\*/);
    const codeMatch = remaining.match(/`(.+?)`/);
    let firstMatch = null;
    let firstIndex = remaining.length;
    if (boldMatch && boldMatch.index < firstIndex) { firstMatch = 'bold'; firstIndex = boldMatch.index; }
    if (codeMatch && codeMatch.index < firstIndex) { firstMatch = 'code'; firstIndex = codeMatch.index; }
    if (italicMatch && italicMatch.index < firstIndex && firstMatch !== 'bold') { firstMatch = 'italic'; firstIndex = italicMatch.index; }
    if (!firstMatch) { parts.push(remaining); break; }
    if (firstIndex > 0) parts.push(remaining.slice(0, firstIndex));
    if (firstMatch === 'bold') { parts.push(<strong key={key++} className="font-semibold text-intuit-800">{boldMatch[1]}</strong>); remaining = remaining.slice(firstIndex + boldMatch[0].length); }
    else if (firstMatch === 'code') { parts.push(<code key={key++} className="bg-slate-100 text-intuit-600 px-1 py-0.5 rounded text-xs font-mono">{codeMatch[1]}</code>); remaining = remaining.slice(firstIndex + codeMatch[0].length); }
    else { parts.push(<em key={key++} className="italic text-slate-600">{italicMatch[1]}</em>); remaining = remaining.slice(firstIndex + italicMatch[0].length); }
  }
  return parts;
}

- **"How's my promotion readiness?"** — Assessment against Director bar
- **"Show me my goals"** — FY26 objectives and progress
- **"Craft skills assessment"** — Gap analysis against PM Rubric FY26
- **"Create a development plan"** — 90-day path to Director
- **"How do I leverage my vision strategy?"** — Using your Enterprise Vision paper
- **"Summarize my feedback"** — Themes and growth areas

You can also ask about specific topics like CK integration, ServiceNow progress, or team updates.`;
  }

  /* ── MANAGER MODE ── */

  // Team overview
  if (q.includes('team') && (q.includes('overview') || q.includes('summary') || q.includes('status') || q.includes('how'))) {
    return `## Team Overview — ${TEAM.length} Direct Reports + Supporting PMs

${TEAM.map(t=>{
  const atRisk = t.projects?.filter(p=>p.status==='at-risk'||p.status==='off-track').length || 0;
  const statusIcon = atRisk > 2 ? '🔴' : atRisk > 0 ? '🟡' : '🟢';
  const sub = t.reportsTo ? ` *(${t.reportsTo})*` : '';
  return `### ${statusIcon} ${t.name} — ${t.role}${sub}\n**Area**: ${t.area}\n**Active projects**: ${t.projects?.length || 0} | **At-risk**: ${atRisk}\n**Top focus**: ${t.projects?.[0]?.name || 'N/A'} — ${t.projects?.[0]?.detail?.slice(0,100) || 'N/A'}...`;
}).join('\n\n')}

### Quick Actions
- Ask about a specific person: *"How is Tammy doing?"*
- Get feedback drafts: *"Draft feedback for Sylesh"*
- Risk review: *"Show me all risks"*`;
  }

  // Risk review
  if (q.includes('risk') || q.includes('blocker') || q.includes('escalat') || q.includes('issue')) {
    const highRisks = RISK_SUMMARY.filter(r=>r.severity==='high');
    const medRisks = RISK_SUMMARY.filter(r=>r.severity==='medium');
    const lowRisks = RISK_SUMMARY.filter(r=>r.severity==='low');
    return `## Risk Review — As of March 2026

### 🔴 High Priority (${highRisks.length})
${highRisks.map(r=>`**${r.area}** *(${r.owner})*\n${r.detail}\n`).join('\n')}

### 🟡 Medium Priority (${medRisks.length})
${medRisks.map(r=>`**${r.area}** *(${r.owner})*\n${r.detail}\n`).join('\n')}

### 🟢 Lower Priority (${lowRisks.length})
${lowRisks.map(r=>`**${r.area}** *(${r.owner})*\n${r.detail}\n`).join('\n')}

### Recommended Leadership Actions
1. **This week**: Drive TPEP executive decision — blocking both Pavel and Umang
2. **This week**: Ensure Change Enablement resource gap gets leadership decision by Mar 6
3. **By Mar 16**: Resolve Docebo renewal pricing and budget allocation
4. **By Mar 6**: Escalate iCIMS data archival — get Himanshu team engaged
5. **Monitor**: Separation App scope governance — Pavel needs air cover to push back on non-critical requests`;
  }

  // Individual person deep-dive
  const personMatch = TEAM.find(t => {
    const firstName = t.name.toLowerCase().split(' ')[0];
    return q.includes(firstName);
  });

  if (personMatch && (q.includes('feedback') || q.includes('sbi') || q.includes('draft'))) {
    const topProject = personMatch.projects?.[0];
    const atRiskProject = personMatch.projects?.find(p=>p.status==='at-risk'||p.status==='off-track');
    return `## SBI Feedback Draft — ${personMatch.name}

### Positive Feedback (Situation-Behavior-Impact)
**Situation**: During the ${topProject?.name || 'current quarter'} work this quarter
**Behavior**: ${personMatch.name.split(' ')[0]} ${topProject?.detail?.slice(0,120) || 'delivered consistently across their portfolio'}
**Impact**: This helped the team maintain momentum on critical deliverables and demonstrated strong ${personMatch.role === 'Principal PM' || personMatch.role === 'Staff PM' ? 'senior-level ownership' : 'growing ownership'}.

${atRiskProject ? `### Developmental Feedback
**Situation**: On the ${atRiskProject.name} initiative
**Behavior**: The ${atRiskProject.detail?.slice(0,120)}
**Impact**: This creates risk to delivery timelines. Consider coaching on proactive risk escalation and stakeholder management.` : ''}

### Key Risks for ${personMatch.name.split(' ')[0]}
${(personMatch.risks||[]).map(r=>`- ${r}`).join('\n')}

### Coaching Suggestions
- Current level: **${personMatch.currentLevel || personMatch.role}** → Target: **${personMatch.targetLevel || 'Next level'}**
- Promo readiness: **${personMatch.promoReadiness}%**`;
  }

  if (personMatch) {
    const sub = personMatch.reportsTo ? `\n*${personMatch.reportsTo}*` : '';
    return `## ${personMatch.name} — ${personMatch.role}${sub}
**Area**: ${personMatch.area}
**Promo Readiness**: ${personMatch.promoReadiness}% → ${personMatch.targetLevel || 'Next level'}

### Current Projects
${(personMatch.projects||[]).map(p=>{
  const icon = p.status==='completed' ? '✅' : p.status==='on-track' ? '🟢' : p.status==='at-risk' ? '🟡' : p.status==='off-track' ? '🔴' : '⏸️';
  return `${icon} **${p.name}**\n${p.detail}`;
}).join('\n\n')}

### Current Risks
${(personMatch.risks||[]).map(r=>`- ⚠️ ${r}`).join('\n')}

### Quick Actions
- *"Draft feedback for ${personMatch.name.split(' ')[0]}"*
- *"1:1 agenda for ${personMatch.name.split(' ')[0]}"*`;
  }

  // 1:1 prep
  if (q.includes('1:1') || q.includes('one on one') || q.includes('1-on-1') || q.includes('agenda')) {
    return `## 1:1 Agenda Generator

Which team member? Try:
${TEAM.map(t=>`- *"1:1 agenda for ${t.name.split(' ')[0]}"*`).join('\n')}

Or ask me to *"prepare all 1:1s for this week"*`;
  }

  // Promo readiness
  if (q.includes('promo') || q.includes('promot') || q.includes('readiness')) {
    const sorted = [...TEAM].sort((a,b)=>(b.promoReadiness||0)-(a.promoReadiness||0));
    return `## Team Promotion Readiness

${sorted.map((t,i)=>{
  const bar = '█'.repeat(Math.round((t.promoReadiness||0)/5)) + '░'.repeat(20-Math.round((t.promoReadiness||0)/5));
  const sub = t.reportsTo ? ` *(${t.reportsTo})*` : '';
  return `**${i+1}. ${t.name}** — ${t.promoReadiness}%${sub}\n${t.currentLevel || t.role} → ${t.targetLevel || 'Next'}\n\`${bar}\``;
}).join('\n\n')}

### Coaching Priorities
1. **${sorted[sorted.length-1].name.split(' ')[0]}** (${sorted[sorted.length-1].promoReadiness}%) — needs the most development investment
2. **${sorted[sorted.length-2].name.split(' ')[0]}** (${sorted[sorted.length-2].promoReadiness}%) — close behind, focused growth plan
3. **${sorted[0].name.split(' ')[0]}** (${sorted[0].promoReadiness}%) — closest to ready, focus on closing final gaps`;
  }

  // Development
  if (q.includes('develop') || q.includes('coach') || q.includes('grow')) {
    return `## Team Development Priorities

${TEAM.map(t=>{
  const sub = t.reportsTo ? ` *(${t.reportsTo})*` : '';
  return `### ${t.name} — ${t.role}${sub}
**${t.currentLevel || t.role}** → **${t.targetLevel || 'Next level'}** (${t.promoReadiness}% ready)
- **Focus**: ${t.risks?.[0]?.slice(0,80) || 'Continue current trajectory'}
- **Action**: ${t.promoReadiness >= 75 ? 'Ready for stretch assignment or acting-up opportunity' : t.promoReadiness >= 60 ? 'Needs targeted growth in 1-2 areas — schedule development 1:1' : 'Invest in foundational skills and increase coaching frequency'}`;
}).join('\n\n')}`;
  }

  // Default manager response
  return `## How Can I Help?

I can help you manage your team of **${TEAM.length} PMs**. Try asking:

- **"Team overview"** — Status across all reports
- **"Show me all risks"** — Prioritized risk review from latest updates
- **"How is Tammy doing?"** — Deep dive on any team member
- **"Draft feedback for Sylesh"** — SBI feedback for anyone
- **"Team promo readiness"** — Ranking and coaching priorities
- **"Team development"** — Growth plans and coaching areas

You can ask about anyone: Navneet, Kevin, Tammy, Umang, Amith, Sylesh, or Pavel.`;
}

/* ── GUIDED PROMPTS ── */
const EMPLOYEE_GUIDES = [
  {icon:'📊', label:'Promotion Readiness', prompt:'How is my promotion readiness for Director?', color:'intuit'},
  {icon:'🎯', label:'My Goals', prompt:'Show me my FY26 goals and progress', color:'mint'},
  {icon:'📐', label:'Craft Skills', prompt:'Assess my craft skills against the Director bar', color:'warm'},
  {icon:'📋', label:'Development Plan', prompt:'Create a 90-day development plan for me', color:'intuit'},
  {icon:'💡', label:'Vision Strategy', prompt:'How do I leverage my Enterprise Vision Strategy?', color:'mint'},
  {icon:'💬', label:'Feedback Summary', prompt:'Summarize the feedback I have received', color:'warm'},
];
const MANAGER_GUIDES = [
  {icon:'👥', label:'Team Overview', prompt:'Give me a team overview with status', color:'intuit'},
  {icon:'⚠️', label:'Risk Review', prompt:'Show me all current risks across the team', color:'coral'},
  {icon:'📈', label:'Promo Readiness', prompt:'Show team promotion readiness rankings', color:'mint'},
  {icon:'📝', label:'Draft Feedback', prompt:'Help me draft SBI feedback', color:'warm'},
  {icon:'🌱', label:'Development', prompt:'Show team development priorities and coaching areas', color:'intuit'},
  {icon:'🗓️', label:'1:1 Prep', prompt:'Help me prepare my 1:1 agendas', color:'mint'},
];

/* ── MAIN APP ── */
function App() {
  const [mode, setMode] = useState('employee');
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [showWelcome, setShowWelcome] = useState(true);
  const chatEnd = useRef(null);
  const inputRef = useRef(null);

  useEffect(()=>{ chatEnd.current?.scrollIntoView({behavior:'smooth'}); },[msgs,loading]);

  const switchMode = (m) => {
    setMode(m);
    setMsgs([]);
    setShowWelcome(true);
  };

  const send = async (text) => {
    const userMsg = text || input.trim();
    if (!userMsg || loading) return;
    setInput('');
    setShowWelcome(false);
    setMsgs(p=>[...p,{role:'user',content:userMsg}]);
    setLoading(true);

    // Simulate brief thinking
    await new Promise(r=>setTimeout(r, 400 + Math.random()*600));

    const result = generateResponse(userMsg, mode);
    setMsgs(p=>[...p,{role:'assistant',content:result}]);
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(), 100);
  };

  const guides = mode === 'employee' ? EMPLOYEE_GUIDES : MANAGER_GUIDES;

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-intuit-50">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-lg bg-intuit-500 flex items-center justify-center">
              <span className="text-white text-sm font-bold">G</span>
            </div>
            <div>
              <h1 className="text-base font-semibold text-intuit-800">PM&D Growth Agent</h1>
              <p className="text-xs text-slate-500">Powered by your portfolio data</p>
            </div>
          </div>
          <div className="flex items-center bg-slate-100 rounded-full p-0.5">
            <button onClick={()=>switchMode('employee')}
              className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${mode==='employee' ? 'bg-white text-intuit-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
              My Growth
            </button>
            <button onClick={()=>switchMode('manager')}
              className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${mode==='manager' ? 'bg-white text-intuit-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
              My Team
            </button>
          </div>
        </div>
      </header>

      {/* Chat Area */}
      <div className="max-w-4xl mx-auto px-4 pb-36">
        {/* Welcome / Guide */}
        {showWelcome && (
          <div className="fade-up pt-8 pb-4">
            <div className="text-center mb-6">
              <h2 className="text-2xl font-semibold text-intuit-800 mb-1">
                {mode === 'employee' ? `Hi Ishita 👋` : `Team Dashboard`}
              </h2>
              <p className="text-slate-500 text-sm">
                {mode === 'employee'
                  ? 'Your personal growth companion — Director readiness, goals, and craft skills'
                  : `Managing ${TEAM.length} PMs across ${TEAM.filter(t=>!t.reportsTo).length} domains + ${TEAM.filter(t=>t.reportsTo).length} supporting`}
              </p>
            </div>

            {/* Team Cards (Manager mode only) */}
            {mode === 'manager' && (
              <div className="mb-6">
                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">
                  {TEAM.map((t,i) => {
                    const atRisk = t.projects?.filter(p=>p.status==='at-risk'||p.status==='off-track').length || 0;
                    const statusColor = atRisk > 2 ? 'bg-coral-50 border-coral-500' : atRisk > 0 ? 'bg-warm-50 border-warm-500' : 'bg-mint-50 border-mint-500';
                    const dotColor = atRisk > 2 ? 'bg-coral-500' : atRisk > 0 ? 'bg-warm-500' : 'bg-mint-500';
                    return (
                      <button key={i}
                        onClick={()=>send(`How is ${t.name.split(' ')[0]} doing?`)}
                        className={`guide-card text-left p-3 rounded-xl border-l-3 ${statusColor} bg-white border border-slate-100 hover:border-intuit-200`}>
                        <div className="flex items-center gap-1.5 mb-1">
                          <div className={`w-2 h-2 rounded-full ${dotColor}`}></div>
                          <span className="text-xs font-semibold text-intuit-800 truncate">{t.name.split(' ')[0]}</span>
                        </div>
                        <p className="text-[10px] text-slate-500 leading-tight">{t.role}</p>
                        <p className="text-[10px] text-slate-400 leading-tight truncate">{t.area}</p>
                        {t.reportsTo && <p className="text-[9px] text-intuit-400 mt-0.5 italic">{t.reportsTo}</p>}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Employee summary card */}
            {mode === 'employee' && (
              <div className="mb-6 bg-white rounded-2xl border border-slate-100 p-5 shadow-sm">
                <div className="flex items-center justify-between mb-3">
                  <div>
                    <p className="text-sm font-semibold text-intuit-800">{ME.role}</p>
                    <p className="text-xs text-slate-500">{ME.team}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-2xl font-bold text-intuit-500">{ME.promoReadiness}%</p>
                    <p className="text-[10px] text-slate-400">Director Readiness</p>
                  </div>
                </div>
                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-intuit-400 to-intuit-500 rounded-full transition-all" style={{width:`${ME.promoReadiness}%`}}></div>
                </div>
                <div className="flex justify-between mt-1">
                  <span className="text-[10px] text-slate-400">Group PM</span>
                  <span className="text-[10px] text-intuit-500 font-medium">Target: Director</span>
                </div>
              </div>
            )}

            {/* Guide Cards */}
            <p className="text-xs font-medium text-slate-400 uppercase tracking-wide mb-2 ml-1">Get started</p>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {guides.map((g,i) => (
                <button key={i}
                  onClick={()=>send(g.prompt)}
                  className="guide-card text-left p-3 rounded-xl bg-white border border-slate-100 hover:border-intuit-200 hover:bg-intuit-50/50">
                  <span className="text-lg mb-1 block">{g.icon}</span>
                  <span className="text-sm font-medium text-intuit-800">{g.label}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Messages */}
        {msgs.map((m,i) => (
          <div key={i} className={`msg-enter ${m.role === 'user' ? 'flex justify-end' : ''} mt-4`}>
            {m.role === 'user' ? (
              <div className="max-w-[75%] bg-intuit-500 text-white rounded-2xl rounded-br-md px-4 py-2.5">
                <p className="text-sm">{m.content}</p>
              </div>
            ) : (
              <div className="bg-white rounded-2xl border border-slate-100 shadow-sm px-5 py-4 max-w-full">
                <RenderMD text={m.content} />
              </div>
            )}
          </div>
        ))}

        {/* Loading */}
        {loading && (
          <div className="mt-4 msg-enter">
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm px-5 py-4 inline-flex items-center gap-1.5">
              <div className="w-2 h-2 rounded-full bg-intuit-400 typing-dot"></div>
              <div className="w-2 h-2 rounded-full bg-intuit-400 typing-dot"></div>
              <div className="w-2 h-2 rounded-full bg-intuit-400 typing-dot"></div>
            </div>
          </div>
        )}
        <div ref={chatEnd} />
      </div>

      {/* Input */}
      <div className="fixed bottom-0 inset-x-0 bg-gradient-to-t from-white via-white to-transparent pt-6 pb-4 px-4">
        <div className="max-w-4xl mx-auto">
          {!showWelcome && (
            <div className="flex gap-1.5 mb-2 overflow-x-auto pb-1 scrollbar-hide">
              {(mode === 'employee'
                ? ['Promotion readiness','My goals','Craft skills','Development plan']
                : ['Team overview','Risk review','Promo readiness','Draft feedback']
              ).map((s,i) => (
                <button key={i} onClick={()=>send(s)}
                  className="whitespace-nowrap px-3 py-1 rounded-full text-xs font-medium bg-white border border-slate-200 text-slate-600 hover:bg-intuit-50 hover:text-intuit-600 hover:border-intuit-200 transition-colors">
                  {s}
                </button>
              ))}
            </div>
          )}
          <div className="flex gap-2 items-end">
            <div className="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm focus-within:border-intuit-400 focus-within:ring-2 focus-within:ring-intuit-100 transition-all">
              <input ref={inputRef} value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder={mode==='employee' ? 'Ask about your growth, goals, craft skills...' : 'Ask about your team, risks, feedback...'}
                className="w-full px-4 py-3 bg-transparent text-sm text-slate-800 placeholder-slate-400 outline-none rounded-2xl" />
            </div>
            <button onClick={()=>send()}
              disabled={!input.trim()||loading}
              className="w-10 h-10 rounded-xl bg-intuit-500 text-white flex items-center justify-center hover:bg-intuit-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors flex-shrink-0">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
          <p className="text-[10px] text-slate-400 text-center mt-2">Responses generated from your portfolio data — FY26 weekly updates through March 2026</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
