function RenderMD({text}) {
  if (!text) return null;
  const lines = text.split('\n'), els = [];
  let i = 0;
  while (i < lines.length) {
    const L = lines[i];
    if (L.startsWith('### ')) els.push(<h3 key={i} className="text-sm font-semibold text-slate-200 mt-3 mb-1">{L.slice(4)}</h3>);
    else if (L.startsWith('## ')) els.push(<h2 key={i} className="text-base font-semibold text-white mt-3 mb-1">{L.slice(3)}</h2>);
    else if (L.startsWith('---')) els.push(<hr key={i} className="my-3 border-slate-700"/>);
    else if (L.startsWith('- ')||L.startsWith('* ')) {
      const items=[];
      while(i<lines.length&&(lines[i].startsWith('- ')||lines[i].startsWith('* '))) { items.push(<li key={i} className="ml-4 text-sm text-slate-300 leading-relaxed">{fmt(lines[i].slice(2))}</li>); i++; }
      els.push(<ul key={`u${i}`} className="list-disc my-1 space-y-0.5">{items}</ul>); continue;
    }
    else if (L.match(/^\d+\.\s/)) {
      const items=[];
      while(i<lines.length&&lines[i].match(/^\d+\.\s/)) { items.push(<li key={i} className="ml-4 text-sm text-slate-300 leading-relaxed">{fmt(lines[i].replace(/^\d+\.\s/,''))}</li>); i++; }
      els.push(<ol key={`o${i}`} className="list-decimal my-1 space-y-0.5">{items}</ol>); continue;
    }
    else if (L.startsWith('> ')) els.push(<blockquote key={i} className="border-l-2 border-brand-400 pl-3 my-2 text-sm text-slate-400 italic">{fmt(L.slice(2))}</blockquote>);
    else if (L.trim()) els.push(<p key={i} className="text-sm text-slate-300 leading-relaxed my-1">{fmt(L)}</p>);
    i++;
  }
  return <div>{els}</div>;
}
function fmt(t) {
  const p=[]; let r=t, k=0;
  while(r.length>0) {
    const b=r.match(/\*\*(.+?)\*\*/), c=r.match(/`(.+?)`/), it=r.match(/\*(.+?)\*/);
    let m=null, idx=r.length;
    if(b&&b.index<idx){m='b';idx=b.index;} if(c&&c.index<idx){m='c';idx=c.index;} if(it&&it.index<idx&&m!=='b'){m='i';idx=it.index;}
    if(!m){p.push(r);break;}
    if(idx>0)p.push(r.slice(0,idx));
    if(m==='b'){p.push(<strong key={k++} className="font-semibold text-white">{b[1]}</strong>);r=r.slice(idx+b[0].length);}
    else if(m==='c'){p.push(<code key={k++} className="bg-slate-800 text-brand-300 px-1 rounded text-xs">{c[1]}</code>);r=r.slice(idx+c[0].length);}
    else{p.push(<em key={k++} className="italic text-slate-400">{it[1]}</em>);r=r.slice(idx+it[0].length);}
  }
  return p;
}

  const sub=t.reportsTo?` *(${t.reportsTo})*`:'';
  if(t.recentlyPromoted) return `**${t.name}**${sub} — ${t.role}\nRecently promoted. Coach on: ${t.risks?.[0]||'current portfolio'}.`;
  return `**${t.name}**${sub} — ${t.role} → ${t.targetLevel||'Next'}\nFocus: ${t.risks?.[0]||'Continue trajectory'}`;
}).join('\n\n')}`;
  }

  return `I can help manage your **${team.length} PMs**:

- **"Team overview"** — status across all
- **"Risks"** — prioritized review
- **"How is Tammy doing?"** — individual deep-dive
- **"Feedback for Sylesh"** — SBI draft
- **"Promo targets"** — team progression
- **"Development"** — coaching priorities`;
}

/* ═══ SETUP FLOW ═══ */
function Setup({onDone}) {
  const [step, setStep] = useState(0);
  const [d, setD] = useState({name:'',role:'',org:'',target:'',goals:'',wins:'',strengths:'',gaps:''});

  if (step === 0) return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="max-w-md w-full fade-up">
        <div className="glass rounded-2xl p-8 text-center">
          <div className="w-12 h-12 rounded-xl bg-brand-400 flex items-center justify-center mx-auto mb-4">
            <span className="text-white text-lg font-bold">G</span>
          </div>
          <h1 className="text-xl font-bold text-white mb-1">PM&D Growth Agent</h1>
          <p className="text-slate-400 text-sm mb-6">Career growth & team management</p>
          <button onClick={()=>onDone(null)}
            className="w-full py-2.5 rounded-xl bg-brand-400 text-white text-sm font-medium hover:bg-brand-500 transition mb-2.5">
            Continue as Ishita Kaul
          </button>
          <button onClick={()=>setStep(1)}
            className="w-full py-2.5 rounded-xl border border-slate-600 text-slate-300 text-sm font-medium hover:border-brand-400 transition">
            Set up my profile
          </button>
          <p className="text-[10px] text-slate-600 mt-4">Data stays in your browser</p>
        </div>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="max-w-lg w-full fade-up">
        <div className="glass rounded-2xl p-6">
          <div className="flex gap-1.5 mb-5">
            {[1,2,3].map(s=><div key={s} className={`h-1 flex-1 rounded-full ${step>=s?'bg-brand-400':'bg-slate-700'}`}/>)}
          </div>

          {step===1 && (<>
            <h2 className="text-base font-semibold text-white mb-0.5">About you</h2>
            <p className="text-xs text-slate-400 mb-4">Your role and target</p>
            <div className="space-y-2.5">
              <input value={d.name} onChange={e=>setD({...d,name:e.target.value})} placeholder="Name" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none"/>
              <input value={d.role} onChange={e=>setD({...d,role:e.target.value})} placeholder="Current role (e.g., Staff PM)" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none"/>
              <input value={d.org} onChange={e=>setD({...d,org:e.target.value})} placeholder="Org / team" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none"/>
              <input value={d.target} onChange={e=>setD({...d,target:e.target.value})} placeholder="Target level (e.g., Director)" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none"/>
            </div>
            <button onClick={()=>setStep(2)} disabled={!d.name||!d.role}
              className="w-full py-2.5 rounded-xl bg-brand-400 text-white text-sm font-medium mt-4 disabled:opacity-30 hover:bg-brand-500 transition">Next</button>
          </>)}

          {step===2 && (<>
            <h2 className="text-base font-semibold text-white mb-0.5">Your work</h2>
            <p className="text-xs text-slate-400 mb-4">Goals, outcomes, and strengths (one per line)</p>
            <div className="space-y-2.5">
              <div>
                <label className="text-xs text-slate-400 mb-1 block">Goals / objectives</label>
                <textarea value={d.goals} onChange={e=>setD({...d,goals:e.target.value})} rows={3} placeholder={"Deliver X by Q3\nLaunch Y platform\nGrow team capabilities"} className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none resize-none"/>
              </div>
              <div>
                <label className="text-xs text-slate-400 mb-1 block">Key outcomes / wins</label>
                <textarea value={d.wins} onChange={e=>setD({...d,wins:e.target.value})} rows={3} placeholder={"Launched feature X — 30% efficiency gain\nAuthored strategy paper for VP review\nLed cross-functional initiative"} className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none resize-none"/>
              </div>
            </div>
            <div className="flex gap-2 mt-4">
              <button onClick={()=>setStep(1)} className="flex-1 py-2.5 rounded-xl border border-slate-600 text-slate-300 text-sm hover:border-slate-500 transition">Back</button>
              <button onClick={()=>setStep(3)} className="flex-1 py-2.5 rounded-xl bg-brand-400 text-white text-sm font-medium hover:bg-brand-500 transition">Next</button>
            </div>
          </>)}

          {step===3 && (<>
            <h2 className="text-base font-semibold text-white mb-0.5">Growth areas</h2>
            <p className="text-xs text-slate-400 mb-4">What you're strong at and where to invest (one per line)</p>
            <div className="space-y-2.5">
              <div>
                <label className="text-xs text-slate-400 mb-1 block">Strengths</label>
                <textarea value={d.strengths} onChange={e=>setD({...d,strengths:e.target.value})} rows={3} placeholder={"Cross-functional execution\nStrategic vision and roadmapping\nTeam development"} className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none resize-none"/>
              </div>
              <div>
                <label className="text-xs text-slate-400 mb-1 block">Areas to grow</label>
                <textarea value={d.gaps} onChange={e=>setD({...d,gaps:e.target.value})} rows={3} placeholder={"Executive stakeholder management\nQuantifying business impact\nExternal thought leadership"} className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none resize-none"/>
              </div>
            </div>
            <div className="flex gap-2 mt-4">
              <button onClick={()=>setStep(2)} className="flex-1 py-2.5 rounded-xl border border-slate-600 text-slate-300 text-sm hover:border-slate-500 transition">Back</button>
              <button onClick={()=>{
                const parse = s => s.split('\n').map(l=>l.trim()).filter(Boolean);
                const profile = {
                  name:d.name, role:d.role, org:d.org, target:d.target||'Next level',
                  goals:parse(d.goals), wins:parse(d.wins), strengths:parse(d.strengths), areasToGrow:parse(d.gaps),
                  craftPillars:['Product Strategy','Product Execution','Technology Fluency','Org Effectiveness'],
                };
                localStorage.setItem('pmd_profile', JSON.stringify(profile));
                onDone(profile);
              }} className="flex-1 py-2.5 rounded-xl bg-brand-400 text-white text-sm font-medium hover:bg-brand-500 transition">Launch</button>
            </div>
          </>)}
        </div>
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App() {
  const [me, setMe] = useState(null);
  const [ready, setReady] = useState(false);
  const [mode, setMode] = useState('employee');
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [welcome, setWelcome] = useState(true);
  const end = useRef(null);
  const inp = useRef(null);

  useEffect(()=>{ const s=localStorage.getItem('pmd_profile'); if(s){setMe(JSON.parse(s));setReady(true);} },[]);
  useEffect(()=>{ end.current?.scrollIntoView({behavior:'smooth'}); },[msgs,loading]);

  const team = me?.name===DEFAULT_ME.name ? DEFAULT_TEAM : [];
  const risks = me?.name===DEFAULT_ME.name ? RISKS : [];

  const go = (m) => { setMode(m); setMsgs([]); setWelcome(true); };

  const send = async (text) => {
    const msg = text||input.trim(); if(!msg||loading) return;
    setInput(''); setWelcome(false);
    setMsgs(p=>[...p,{r:'u',c:msg}]); setLoading(true);
    await new Promise(r=>setTimeout(r, 250+Math.random()*400));
    setMsgs(p=>[...p,{r:'a',c:respond(msg, mode, me||DEFAULT_ME, team, risks)}]);
    setLoading(false);
    setTimeout(()=>inp.current?.focus(),100);
  };

  const reset = () => { localStorage.removeItem('pmd_profile'); setMe(null); setReady(false); setMsgs([]); setWelcome(true); };

  if (!ready) return <Setup onDone={p=>{ if(p)setMe(p); else setMe(DEFAULT_ME); setReady(true); }} />;

  const eg = mode==='employee'
    ? [{l:'My Goals',p:'Show my goals'},{l:'Outcomes',p:'What have I delivered?'},{l:'Craft Skills',p:'Assess my craft skills'},{l:'Growth Areas',p:'Where should I invest?'},{l:'Strategy Work',p:'My authored work'},{l:'Action Plan',p:'What should I do next?'}]
    : [{l:'Team Status',p:'Team overview'},{l:'Risks',p:'Show risks'},{l:'Promo Targets',p:'Promo targets'},{l:'Feedback',p:'Help draft feedback'},{l:'Development',p:'Development priorities'}];

  return (
    <div className="min-h-screen flex flex-col">
      <header className="bg-brand-800/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-30">
        <div className="max-w-4xl mx-auto px-4 py-2.5 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg bg-brand-400 flex items-center justify-center">
              <span className="text-white text-xs font-bold">G</span>
            </div>
            <div>
              <h1 className="text-sm font-semibold text-white leading-tight">PM&D Growth Agent</h1>
              <p className="text-[10px] text-slate-400">{me?.name} · {me?.role}</p>
            </div>
          </div>
          <div className="flex items-center gap-2.5">
            <div className="flex bg-slate-800/60 rounded-full p-0.5">
              <button onClick={()=>go('employee')} className={`px-3 py-1 rounded-full text-xs font-medium transition ${mode==='employee'?'bg-brand-400 text-white':'text-slate-400 hover:text-white'}`}>My Growth</button>
              {team.length>0 && <button onClick={()=>go('manager')} className={`px-3 py-1 rounded-full text-xs font-medium transition ${mode==='manager'?'bg-brand-400 text-white':'text-slate-400 hover:text-white'}`}>My Team</button>}
            </div>
            <button onClick={reset} className="text-slate-500 hover:text-slate-300" title="Switch profile">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
          </div>
        </div>
      </header>

      <div className="flex-1 max-w-4xl w-full mx-auto px-4 pb-36">
        {welcome && (
          <div className="fade-up pt-6 pb-3">
            <div className="text-center mb-4">
              <h2 className="text-lg font-semibold text-white">
                {mode==='employee'?`${me?.name?.split(' ')[0]}'s Growth`:'Team Dashboard'}
              </h2>
              <p className="text-slate-500 text-xs">
                {mode==='employee'?(me?.target?`Path to ${me.target}`:'Your growth companion'):`${team.length} PMs`}
              </p>
            </div>

            {mode==='manager' && team.length>0 && (
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-1.5 mb-4">
                {team.map((t,i) => {
                  const ar=(t.projects||[]).filter(p=>p.s==='at-risk'||p.s==='off-track').length;
                  const dot=ar>2?'bg-rose-400':ar>0?'bg-amber-400':'bg-mint-400';
                  return (
                    <button key={i} onClick={()=>send(`How is ${t.name.split(' ')[0]} doing?`)} className="card-hover glass rounded-lg p-2.5 text-left">
                      <div className="flex items-center gap-1.5 mb-0.5">
                        <div className={`w-1.5 h-1.5 rounded-full ${dot}`}/>
                        <span className="text-[11px] font-semibold text-white truncate">{t.name.split(' ')[0]}</span>
                      </div>
                      <p className="text-[9px] text-slate-400 truncate">{t.role} · {t.area.split('—')[0].trim()}</p>
                      {t.reportsTo && <p className="text-[8px] text-brand-300 mt-0.5">{t.reportsTo}</p>}
                    </button>
                  );
                })}
              </div>
            )}

            <div className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-w-xl mx-auto">
              {eg.map((g,i)=>(<button key={i} onClick={()=>send(g.p)} className="card-hover glass rounded-lg px-3 py-2.5 text-left">
                <span className="text-xs font-medium text-slate-200">{g.l}</span>
              </button>))}
            </div>
          </div>
        )}

        {msgs.map((m,i) => (
          <div key={i} className={`msg-enter ${m.r==='u'?'flex justify-end':''} mt-3`}>
            {m.r==='u' ? (
              <div className="max-w-[75%] bg-brand-400 rounded-2xl rounded-br-sm px-4 py-2"><p className="text-sm text-white">{m.c}</p></div>
            ) : (
              <div className="glass rounded-2xl px-4 py-3"><RenderMD text={m.c}/></div>
            )}
          </div>
        ))}

        {loading && <div className="mt-3 msg-enter"><div className="glass rounded-2xl px-4 py-3 inline-flex gap-1.5">
          <div className="w-1.5 h-1.5 rounded-full bg-brand-300 typing-dot"/><div className="w-1.5 h-1.5 rounded-full bg-brand-300 typing-dot"/><div className="w-1.5 h-1.5 rounded-full bg-brand-300 typing-dot"/>
        </div></div>}
        <div ref={end}/>
      </div>

      <div className="fixed bottom-0 inset-x-0 bg-gradient-to-t from-brand-900 via-brand-900/95 to-transparent pt-5 pb-3 px-4">
        <div className="max-w-4xl mx-auto">
          {!welcome && (
            <div className="flex gap-1.5 mb-2 overflow-x-auto">
              {(mode==='employee'?['Goals','Outcomes','Craft skills','Growth areas','Action plan']:['Overview','Risks','Promo targets','Feedback','Development']).map((s,i)=>(
                <button key={i} onClick={()=>send(s)} className="whitespace-nowrap px-2.5 py-1 rounded-full text-[11px] font-medium bg-slate-800/60 border border-slate-700 text-slate-400 hover:text-white hover:border-brand-400 transition">{s}</button>
              ))}
            </div>
          )}
          <div className="flex gap-2">
            <div className="flex-1 glass rounded-xl focus-within:border-brand-400 transition">
              <input ref={inp} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder={mode==='employee'?'Ask about goals, skills, growth...':'Ask about team, risks, feedback...'}
                className="w-full px-4 py-2.5 bg-transparent text-sm text-white outline-none rounded-xl"/>
            </div>
            <button onClick={()=>send()} disabled={!input.trim()||loading}
              className="w-9 h-9 rounded-xl bg-brand-400 text-white flex items-center justify-center hover:bg-brand-500 disabled:opacity-30 transition flex-shrink-0">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
