async function callClaude(messages, systemOverride) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) throw new Error('NO_KEY');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1024,
      system: systemOverride || SYSTEM_PROMPT,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

/* ── SVG Charts ── */
function RadarChart({ data, size=280 }) {
  const cx=size/2,cy=size/2,r=size/2-50,n=data.length,step=(2*Math.PI)/n;
  const pt=(i,v,mx=5)=>{const a=-Math.PI/2+i*step;return[cx+(v/mx)*r*Math.cos(a),cy+(v/mx)*r*Math.sin(a)];};
  const poly=k=>data.map((d,i)=>pt(i,d[k]).join(',')).join(' ');
  return (
    <svg width={size} height={size} className="mx-auto">
      {[1,2,3,4,5].map(v=><polygon key={v} points={data.map((_,i)=>pt(i,v).join(',')).join(' ')} fill="none" stroke="#e2e8f0" strokeWidth="0.5"/>)}
      {data.map((_,i)=>{const[x,y]=pt(i,5);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="0.5"/>;})}
      <polygon points={poly('target')} fill="none" stroke="#f97316" strokeWidth="1.5" strokeDasharray="4 4" opacity="0.6"/>
      <polygon points={poly('manager')} fill="rgba(16,185,129,0.08)" stroke="#10B981" strokeWidth="1.5"/>
      <polygon points={poly('self')} fill="rgba(0,119,197,0.1)" stroke="#0077C5" strokeWidth="2"/>
      {data.map((d,i)=>{const[x,y]=pt(i,d.self);return<circle key={'c'+i} cx={x} cy={y} r="4" fill="#0077C5" stroke="#fff" strokeWidth="2"/>;})}
      {data.map((d,i)=>{const[x,y]=pt(i,5.8);return<text key={'t'+i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" className="fill-slate-500" style={{fontSize:'11px',fontWeight:500}}>{d.skill}</text>;})}
    </svg>
  );
}

function LineChart({ data, width=520, height=220 }) {
  const pad={l:40,r:15,t:15,b:30},w=width-pad.l-pad.r,h2=height-pad.t-pad.b;
  const minY=2.5,maxY=4.5,rangeY=maxY-minY;
  const xStep=w/(data.length-1);
  const gy=v=>pad.t+h2-((v-minY)/rangeY)*h2;
  const gx=i=>pad.l+i*xStep;
  const mkPath=key=>data.map((d,i)=>`${i===0?'M':'L'}${gx(i)},${gy(d[key])}`).join(' ');
  const mkArea=key=>`${mkPath(key)}L${gx(data.length-1)},${gy(minY)}L${gx(0)},${gy(minY)}Z`;
  const series=[{key:'goals',color:'#0077C5',label:'Goals'},{key:'feedback',color:'#10B981',label:'Feedback'},{key:'execution',color:'#8B5CF6',label:'Execution'}];
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {[2.5,3.0,3.5,4.0,4.5].map(v=><g key={v}><line x1={pad.l} y1={gy(v)} x2={width-pad.r} y2={gy(v)} stroke="#f1f5f9" strokeWidth="1"/><text x={pad.l-8} y={gy(v)} textAnchor="end" dominantBaseline="middle" style={{fontSize:'10px'}} className="fill-slate-400">{v}</text></g>)}
      {data.map((d,i)=><text key={i} x={gx(i)} y={height-8} textAnchor="middle" style={{fontSize:'10px'}} className="fill-slate-400">{d.month}</text>)}
      {series.map(s=><g key={s.key}><path d={mkArea(s.key)} fill={s.color} opacity="0.04"/><path d={mkPath(s.key)} fill="none" stroke={s.color} strokeWidth="2"/>{data.map((d,i)=><circle key={i} cx={gx(i)} cy={gy(d[s.key])} r="3" fill={s.color} stroke="#fff" strokeWidth="1.5"/>)}</g>)}
    </svg>
  );
}

/* ── useAI Hook ── */
function useAI() {
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState('');
  const [error,setError]=useState('');

  const run = useCallback(async (messages, systemOverride) => {
    setLoading(true); setError(''); setResult('');
    try {
      const text = await callClaude(messages, systemOverride);
      setResult(text);
      return text;
    } catch(e) {
      if (e.message === 'NO_KEY') {
        setError('No API key configured. Go to settings to add your Anthropic API key.');
      } else {
        setError(e.message);
      }
      return null;
    } finally {
      setLoading(false);
    }
  }, []);

  const reset = useCallback(() => { setResult(''); setError(''); }, []);
  return { loading, result, error, run, reset, setResult };
}

  );
}

/* ── AGENT CHAT (Claude-powered) ── */
function AgentChat({persona}) {
  const [open,setOpen]=useState(false);const [min,setMin]=useState(false);
  const [msgs,setMsgs]=useState([{role:'assistant',content:persona==='employee'?"Hi Ishita — I'm your PM&D Growth Agent, powered by Claude AI. I know your T4i portfolio: EH iCIMS migration, Promotions WD Extend, Learning Platform AI, QBL All-In-One, and Local Experts. How can I help?":"Welcome — I'm your Manager Assist co-pilot. I can help with team synthesis across Navneet, Addison, Tammy, Tishya, and Adella's workstreams."}]);
  const [input,setInput]=useState('');const [loading,setLoading]=useState(false);const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,loading]);

  const send = async () => {
    if(!input.trim()||loading) return;
    const userMsg = input.trim();
    setInput('');
    setMsgs(p=>[...p,{role:'user',content:userMsg}]);
    setLoading(true);
    try {
      const apiMsgs = [...msgs.filter(m=>m.role!=='system'),{role:'user',content:userMsg}].map(m=>({role:m.role,content:m.content}));
      const text = await callClaude(apiMsgs, SYSTEM_PROMPT + '\n\nKeep responses concise (under 150 words). Use bullet points. Be actionable.');
      setMsgs(p=>[...p,{role:'assistant',content:text}]);
    } catch(e) {
      setMsgs(p=>[...p,{role:'assistant',content:e.message==='NO_KEY'?'Please add your Anthropic API key in Settings (bottom of sidebar) to enable AI chat.':'Sorry, I encountered an error: '+e.message}]);
    }
    setLoading(false);
  };

  if(!open) return <button onClick={()=>setOpen(true)} className="fixed bottom-6 right-6 w-12 h-12 rounded-full bg-gradient-to-br from-brand-500 to-violet-500 text-white shadow-lg shadow-brand-500/25 flex items-center justify-center hover:scale-105 transition-transform z-50"><I name="spark" size={20}/></button>;
  return (
    <div className={`fixed right-6 bottom-6 bg-white rounded-2xl shadow-2xl border border-slate-200 flex flex-col z-50 transition-all ${min?'w-72 h-12':'w-[360px] h-[500px]'}`}>
      <div className="flex items-center justify-between px-4 py-3 bg-brand-900 rounded-t-2xl shrink-0">
        <div className="flex items-center gap-2.5"><div className="w-7 h-7 rounded-full bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center"><I name="spark" size={14}/></div><div><p className="text-white text-[12px] font-semibold">PM&D Growth Agent</p><p className="text-blue-300/60 text-[10px]">Powered by Claude AI</p></div></div>
        <div className="flex items-center gap-1"><button onClick={()=>setMin(!min)} className="p-1 text-blue-300/50 hover:text-white text-xs">{min?'□':'—'}</button><button onClick={()=>setOpen(false)} className="p-1 text-blue-300/50 hover:text-white"><I name="x" size={13}/></button></div>
      </div>
      {!min&&<>
        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {msgs.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[85%] px-3.5 py-2.5 rounded-2xl text-[12px] leading-relaxed whitespace-pre-line ${m.role==='user'?'bg-brand-500 text-white rounded-br-md':'bg-slate-100 text-slate-700 rounded-bl-md'}`}>{m.content}</div></div>)}
          {loading&&<div className="flex justify-start"><div className="bg-slate-100 px-4 py-3 rounded-2xl rounded-bl-md flex gap-1.5">{[0,1,2].map(d=><span key={d} className="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"/>)}</div></div>}
          <div ref={endRef}/>
        </div>
        <div className="px-3 pb-2 flex gap-1.5 flex-wrap">{['Promotions R1 risk?','CAMP impact summary','Promo readiness','Prep my 1:1 with Rajesh'].map(q=><button key={q} onClick={()=>setInput(q)} className="px-2.5 py-1 rounded-full text-[10px] font-medium bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors">{q}</button>)}</div>
        <div className="p-3 border-t border-slate-100 shrink-0"><div className="flex gap-2"><input type="text" placeholder="Ask anything about your portfolio..." className="flex-1 px-3 py-2 rounded-lg border border-slate-200 text-[12px] bg-slate-50/50 placeholder:text-slate-400" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button onClick={send} disabled={loading} className="w-8 h-8 rounded-lg bg-brand-500 text-white flex items-center justify-center hover:bg-brand-600 transition-colors disabled:opacity-50"><I name="send" size={14}/></button></div></div>
      </>}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [page,setPage]=useState('dashboard');
  const [persona,setPersona]=useState('employee');
  const [showApiSetup,setShowApiSetup]=useState(!localStorage.getItem('anthropic_api_key'));
  const [showSettings,setShowSettings]=useState(false);

  const handleSaveKey = (key) => {
    if (key === 'SKIP') {
      localStorage.setItem('anthropic_api_key', '');
      setShowApiSetup(false);
      return;
    }
    localStorage.setItem('anthropic_api_key', key);
    setShowApiSetup(false);
  };

  const views = {
    dashboard:<Dashboard persona={persona}/>,
    goals:<GoalsCoach/>,
    feedback:<FeedbackCoach/>,
    checkin:<CheckInPrep/>,
    skills:<CraftSkills/>,
    promotion:<Promotion/>,
    development:<DevPlan/>,
  };

  return (
    <div className="flex h-screen overflow-hidden">
      {(showApiSetup || showSettings) && <ApiKeySetup onSave={(k)=>{handleSaveKey(k);setShowSettings(false);}}/>}
      <Sidebar page={page} setPage={setPage} persona={persona} setPersona={setPersona} onSettings={()=>setShowSettings(true)}/>
      <main className="flex-1 overflow-y-auto bg-[#F8FAFC]">{views[page]}</main>
      <AgentChat persona={persona}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
