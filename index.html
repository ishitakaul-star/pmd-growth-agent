/* ── SVG Radar Chart ── */
function RadarChart({ data, size = 260 }) {
  const cx = size/2, cy = size/2, r = size/2 - 40;
  const n = data.length;
  const angleStep = (2*Math.PI)/n;
  const getPoint = (i, val, max=5) => {
    const a = -Math.PI/2 + i*angleStep;
    return [cx + (val/max)*r*Math.cos(a), cy + (val/max)*r*Math.sin(a)];
  };
  const polygon = (key, max=5) => data.map((d,i)=>getPoint(i,d[key],max).join(',')).join(' ');
  const gridLevels = [1,2,3,4,5];

  return (
    <svg width={size} height={size} className="mx-auto">
      {gridLevels.map(lv => (
        <polygon key={lv} points={data.map((_,i)=>getPoint(i,lv).join(',')).join(' ')}
          fill="none" stroke="#e5e7eb" strokeWidth="1" strokeDasharray="3 3"/>
      ))}
      {data.map((_,i) => {
        const [x,y] = getPoint(i,5);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e5e7eb" strokeWidth="1"/>;
      })}
      <polygon points={polygon('target')} fill="none" stroke="#FF6B35" strokeWidth="2" strokeDasharray="5 5"/>
      <polygon points={polygon('manager')} fill="rgba(44,160,28,0.1)" stroke="#2CA01C" strokeWidth="2"/>
      <polygon points={polygon('self')} fill="rgba(0,119,197,0.15)" stroke="#0077C5" strokeWidth="2"/>
      {data.map((d,i) => {
        const [x,y] = getPoint(i,5.6);
        return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" className="text-[10px] fill-gray-600">{d.skill}</text>;
      })}
      {data.map((d,i) => { const [x,y]=getPoint(i,d.self); return <circle key={i} cx={x} cy={y} r="3" fill="#0077C5"/>; })}
    </svg>
  );
}

/* ── SVG Line Chart ── */
function LineChart({ data, width=480, height=200 }) {
  const pad = {l:35,r:10,t:10,b:25};
  const w = width-pad.l-pad.r, h2 = height-pad.t-pad.b;
  const minY=2.5, maxY=4.5, rangeY=maxY-minY;
  const xStep = w/(data.length-1);
  const getY = v => pad.t + h2 - ((v-minY)/rangeY)*h2;
  const getX = i => pad.l + i*xStep;
  const makePath = key => data.map((d,i)=>`${i===0?'M':'L'}${getX(i)},${getY(d[key])}`).join(' ');
  const colors = {goals:'#0077C5',feedback:'#2CA01C',execution:'#6C5CE7'};

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {[2.5,3.0,3.5,4.0,4.5].map(v=>(
        <g key={v}>
          <line x1={pad.l} y1={getY(v)} x2={width-pad.r} y2={getY(v)} stroke="#f0f0f0" strokeWidth="1"/>
          <text x={pad.l-5} y={getY(v)} textAnchor="end" dominantBaseline="middle" className="text-[10px] fill-gray-400">{v}</text>
        </g>
      ))}
      {data.map((d,i)=><text key={i} x={getX(i)} y={height-5} textAnchor="middle" className="text-[10px] fill-gray-500">{d.month}</text>)}
      {Object.keys(colors).map(key=>(
        <g key={key}>
          <path d={makePath(key)} fill="none" stroke={colors[key]} strokeWidth="2"/>
          {data.map((d,i)=><circle key={i} cx={getX(i)} cy={getY(d[key])} r="3" fill={colors[key]}/>)}
        </g>
      ))}
    </svg>
  );
}

      <Card cls="bg-gradient-to-r from-pink-50 to-purple-50 border-pink-200"><div className="flex items-center justify-between"><div><p className="text-xs text-pink-600 font-semibold uppercase">Readiness for Senior Staff PM (T5)</p><div className="flex items-end gap-2 mt-1"><span className="text-4xl font-bold">68%</span><span className="text-sm text-gray-500 mb-1">overall</span></div><p className="text-xs text-gray-600 mt-1">{dem}/{RUBRIC_MATCH.length} rubric skills | {PROMO_EVIDENCE.length} evidence items</p></div><div className="relative w-20 h-20"><svg className="w-20 h-20 -rotate-90" viewBox="0 0 36 36"><path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="#e5e7eb" strokeWidth="3"/><path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="#EC4899" strokeWidth="3" strokeDasharray="68,100"/></svg><span className="absolute inset-0 flex items-center justify-center text-lg font-bold">68%</span></div></div></Card>
      <div className="grid grid-cols-2 gap-5">
        <Card><h3 className="font-semibold text-sm mb-3 flex items-center gap-2"><span className="text-emerald-500"><Ico name="check" size={14}/></span> Strengths</h3>{[{p:'Product Execution',e:'Led 3 major launches in FY26',s:85},{p:'Product Strategy',e:'Defined 3-year platform strategy',s:72}].map((x,i)=><div key={i} className="p-3 rounded-lg bg-emerald-50 mb-2"><div className="flex items-center justify-between mb-1"><p className="text-sm font-medium text-emerald-900">{x.p}</p><span className="text-xs font-bold text-emerald-700">{x.s}%</span></div><p className="text-xs text-emerald-700">{x.e}</p><div className="w-full bg-emerald-100 rounded-full h-1.5 mt-1.5"><div className="bg-emerald-500 h-1.5 rounded-full" style={{width:`${x.s}%`}}/></div></div>)}</Card>
        <Card><h3 className="font-semibold text-sm mb-3 flex items-center gap-2"><span className="text-amber-500"><Ico name="alert" size={14}/></span> Areas to Develop</h3>{[{p:'Org Effectiveness',e:'Need more cross-team influence examples',s:55},{p:'Technology Fluency',e:'Need AI evangelism across portfolio',s:48}].map((x,i)=><div key={i} className="p-3 rounded-lg bg-amber-50 mb-2"><div className="flex items-center justify-between mb-1"><p className="text-sm font-medium text-amber-900">{x.p}</p><span className="text-xs font-bold text-amber-700">{x.s}%</span></div><p className="text-xs text-amber-700">{x.e}</p><div className="w-full bg-amber-100 rounded-full h-1.5 mt-1.5"><div className="bg-amber-500 h-1.5 rounded-full" style={{width:`${x.s}%`}}/></div></div>)}</Card>
      </div>
      <Card><div className="flex items-center justify-between mb-3"><h3 className="font-semibold text-sm">Evidence Portfolio</h3><Pill color="blue"><Ico name="sparkle" size={10}/> AI Assembled</Pill></div>{PROMO_EVIDENCE.map((e,i)=><div key={i} className="flex items-center gap-3 p-2.5 rounded-lg bg-gray-50 mb-1.5"><div className="flex-1 min-w-0"><p className="text-sm font-medium">{e.title}</p><p className="text-xs text-gray-500">{e.date} | {e.impact}</p></div><Pill color="blue">{e.pillar}</Pill><div className="w-12 bg-gray-200 rounded-full h-1.5"><div className="bg-pink-500 h-1.5 rounded-full" style={{width:`${e.score}%`}}/></div></div>)}</Card>
      <Card><div className="flex items-center justify-between mb-3"><h3 className="font-semibold text-sm">Rubric Mapping: Senior Staff PM (T5)</h3><Btn cls="text-xs" onClick={()=>setShowN(!showN)}><Ico name="file" size={11}/> {showN?'Hide':'Generate'} Narrative</Btn></div>{RUBRIC_MATCH.map((r,i)=><div key={i} className="flex items-center gap-3 p-2 rounded-lg bg-gray-50 mb-1.5"><span className={r.dem===true?'text-emerald-500':r.dem==='partial'?'text-amber-500':'text-red-400'}><Ico name={r.dem===true?'check':'alert'} size={14}/></span><div className="flex-1"><p className="text-sm">{r.skill}</p><p className="text-[11px] text-gray-500">Evidence: {r.ev}</p></div></div>)}
        {showN&&<div className="mt-3 p-4 rounded-lg bg-gradient-to-br from-pink-50 to-purple-50 border border-pink-100"><div className="flex items-center gap-2 mb-2"><Ico name="sparkle" size={12} cls="text-pink-600"/><p className="text-xs font-semibold text-pink-700">AI Promotion Narrative</p></div><p className="text-sm text-gray-800 leading-relaxed">Alex has demonstrated consistent Senior Staff PM capabilities across Product Execution and Strategy. Key highlights: SMB AI Onboarding launch (35% time-to-value reduction, 50K users) and VP-approved 3-Year AI Platform Strategy ($10M+ investment). Areas for development: cross-BU influence in Org Effectiveness and AI evangelism in Technology Fluency. Recommended: lead cross-BU architecture review and present at PM All-Hands.</p><div className="flex gap-2 mt-3"><button className="bg-pink-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium">Export Package</button><Btn cls="text-xs">Refine</Btn></div></div>}
      </Card>
    </div>
  );
}

/* ── DEVELOPMENT PLANNER ── */
function DevPlan() {
  const [sel,setSel]=useState(0);
  const paths=[{t:'Senior Staff PM (T5)',tl:'12-18 months',r:68,f:['Org Effectiveness','Tech Fluency']},{t:'Principal PM (T6)',tl:'24-36 months',r:35,f:['Strategic Leadership','Cross-BU Influence']},{t:'Manager 3 (M3)',tl:'18-24 months',r:42,f:['People Management','Team Building']}];
  const milestones=[{l:'Complete AI Strategy Masterclass',d:'Mar 2026',done:true},{l:'Lead cross-BU architecture review',d:'Apr 2026',done:false},{l:'Present at PM All-Hands on AI',d:'May 2026',done:false},{l:'VP mentor relationship established',d:'Mar 2026',done:true},{l:'Ship 2nd launch with P&L metrics',d:'Jun 2026',done:false},{l:'3+ peer feedback on cross-team influence',d:'Jul 2026',done:false}];
  const tc={course:'bg-blue-100 text-intuit-blue',stretch:'bg-purple-100 text-purple-600',mentor:'bg-emerald-100 text-emerald-600',project:'bg-amber-100 text-amber-600'};
  return (
    <div className="p-6 max-w-5xl mx-auto space-y-5 fade-in">
      <div><h1 className="text-2xl font-bold flex items-center gap-2"><Ico name="trending" size={22} cls="text-teal-600"/> Development Planner</h1><p className="text-gray-500 text-sm mt-1">AI-personalized learning, stretch opportunities, and career simulations.</p></div>
      <Card><div className="flex items-center gap-2 mb-3"><Ico name="sparkle" size={14} cls="text-teal-600"/><h2 className="font-semibold text-sm">Career Path Simulation</h2></div><div className="grid grid-cols-3 gap-3">{paths.map((p,i)=><div key={i} onClick={()=>setSel(i)} className={`p-3 rounded-lg border-2 cursor-pointer transition-all ${sel===i?'border-teal-500 bg-teal-50':'border-gray-200 hover:border-gray-300'}`}><h3 className="font-semibold text-sm">{p.t}</h3><p className="text-xs text-gray-500 mt-1">{p.tl}</p><div className="flex items-center gap-2 mt-2"><div className="flex-1 bg-gray-200 rounded-full h-2"><div className="bg-teal-500 h-2 rounded-full" style={{width:`${p.r}%`}}/></div><span className="text-xs font-bold">{p.r}%</span></div><div className="flex flex-wrap gap-1 mt-2">{p.f.map((f,fi)=><Pill key={fi} color="blue">{f}</Pill>)}</div></div>)}</div></Card>
      <div className="grid grid-cols-2 gap-5">
        <Card><h2 className="font-semibold text-sm mb-3">AI Recommendations</h2>{DEV_RECS.map((r,i)=><div key={i} className="flex items-start gap-3 p-2.5 rounded-lg bg-gray-50 mb-2"><div className={`w-7 h-7 rounded-lg flex items-center justify-center shrink-0 ${tc[r.type]}`}><Ico name={r.type==='course'?'book':r.type==='mentor'?'user':'briefcase'} size={14}/></div><div className="flex-1"><p className="text-sm font-medium">{r.title}</p>{r.provider&&<p className="text-[11px] text-gray-400">{r.provider}</p>}</div><Pill color={r.priority==='high'?'red':r.priority==='medium'?'yellow':'blue'}>{r.priority}</Pill></div>)}</Card>
        <Card><h2 className="font-semibold text-sm mb-3">Milestones</h2>{milestones.map((m,i)=><div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-gray-50 mb-1.5"><span className={m.done?'text-emerald-500':'text-gray-300'}><Ico name={m.done?'check':'circle'} size={14}/></span><div className="flex-1"><p className={`text-sm ${m.done?'text-gray-500 line-through':''}`}>{m.l}</p><p className="text-[10px] text-gray-400">Target: {m.d}</p></div></div>)}<div className="mt-3 p-3 rounded-lg bg-teal-50 border border-teal-100"><div className="flex items-start gap-2"><Ico name="sparkle" size={12} cls="text-teal-600"/><p className="text-xs text-teal-800"><strong>AI:</strong> 2 milestones ahead of typical trajectory. Focus on cross-team influence to reach ~80% readiness.</p></div></div></Card>
      </div>
      <Card><h2 className="font-semibold text-sm mb-3">Skill Gap Bridge: Current → {paths[sel].t}</h2>{[{s:'Org Effectiveness',c:3.5,t:4.2,g:'Cross-team strategic influence'},{s:'Technology Fluency',c:3.2,t:4.0,g:'AI evangelism, portfolio-level tech'},{s:'Product Strategy',c:3.5,t:4.0,g:'P&L-linked business outcomes'},{s:'Product Execution',c:4.0,t:4.2,g:'Continue current trajectory'}].map((x,i)=><div key={i} className="flex items-center gap-3 mb-2.5"><div className="w-32 text-sm font-medium">{x.s}</div><div className="flex-1 relative"><div className="bg-gray-100 rounded-full h-3"><div className="bg-teal-400 h-3 rounded-full relative" style={{width:`${(x.c/5)*100}%`}}><span className="absolute right-1 top-0 text-[8px] font-bold text-white leading-3">{x.c}</span></div></div><div className="absolute top-0 h-3 border-r-2 border-dashed border-pink-400" style={{left:`${(x.t/5)*100}%`}}/></div><div className="w-8 text-xs text-gray-500 text-right">{x.t}</div><Ico name="arrow" size={12} cls="text-gray-400"/><div className="w-48 text-xs text-gray-500">{x.g}</div></div>)}</Card>
    </div>
  );
}

/* ── AGENT CHAT ── */
function AgentChat({persona}) {
  const [open,setOpen]=useState(false);const [min,setMin]=useState(false);
  const [msgs,setMsgs]=useState([{role:'assistant',content:persona==='employee'?"Hi Alex! I'm your PM&D Growth Agent. I can help with goals, feedback, 1:1 prep, craft skills, promotion readiness, and development. What would you like?":"Welcome! I'm your Manager Assist co-pilot for team synthesis, 1:1 prep, feedback, and risk detection."}]);
  const [input,setInput]=useState('');const [typing,setTyping]=useState(false);const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,typing]);
  const resps={goal:"4 Active Goals \u2014 3 on track, 1 at risk.\n\nData pipeline at 38%. Recommend:\n1. Break into smaller milestones\n2. Discuss resources in 1:1\n3. Connect with platform team\n\nAdded to your 1:1 agenda.",feedback:"Key Themes:\n\nStrengths: Execution velocity (5 mentions)\nGrowth: Stakeholder communication timing\n\nWant me to draft a response?",promo:"Promo Readiness: 68% for T5\n\nStrong: Execution (85%), Strategy (72%)\nGaps: Org Effectiveness (55%), Tech Fluency (48%)\n\nRecommend: Lead Q3 cross-BU review.",def:"I can help with:\n\u2022 Draft goals aligned to craft skills\n\u2022 SBI feedback with bias detection\n\u2022 1:1 prep from performance data\n\u2022 Promotion readiness assessment\n\u2022 Development plans\n\nWhat would you like?"};
  const send=()=>{if(!input.trim())return;setMsgs(p=>[...p,{role:'user',content:input}]);const q=input.toLowerCase();setInput('');setTyping(true);setTimeout(()=>{const r=q.includes('goal')?resps.goal:q.includes('feedback')?resps.feedback:q.includes('promo')||q.includes('ready')?resps.promo:resps.def;setTyping(false);setMsgs(p=>[...p,{role:'assistant',content:r}]);},1000);};
  if(!open) return <button onClick={()=>setOpen(true)} className="fixed bottom-5 right-5 w-12 h-12 rounded-full bg-intuit-blue text-white shadow-lg flex items-center justify-center hover:bg-blue-700 transition-all hover:scale-105 z-50"><Ico name="bot" size={22}/></button>;
  return (
    <div className={`fixed right-5 bottom-5 bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col z-50 transition-all ${min?'w-72 h-12':'w-80 h-[460px]'}`}>
      <div className="flex items-center justify-between px-3 py-2.5 bg-intuit-navy rounded-t-2xl shrink-0"><div className="flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-intuit-blue flex items-center justify-center"><Ico name="bot" size={13}/></div><div><p className="text-white text-xs font-semibold">PM&D Agent</p><p className="text-blue-300 text-[9px]">{persona==='employee'?'Employee Assist':'Manager Assist'}</p></div></div><div className="flex items-center gap-0.5"><button onClick={()=>setMin(!min)} className="p-1 text-blue-300 hover:text-white text-sm">{min?'\u25A1':'\u2014'}</button><button onClick={()=>setOpen(false)} className="p-1 text-blue-300 hover:text-white"><Ico name="x" size={13}/></button></div></div>
      {!min&&<><div className="flex-1 overflow-y-auto p-3 space-y-2">{msgs.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[85%] px-3 py-2 rounded-xl text-xs leading-relaxed whitespace-pre-line ${m.role==='user'?'bg-intuit-blue text-white rounded-br-sm':'bg-gray-100 text-gray-800 rounded-bl-sm'}`}>{m.content}</div></div>)}{typing&&<div className="flex justify-start"><div className="bg-gray-100 px-3 py-2 rounded-xl rounded-bl-sm flex gap-1">{[0,1,2].map(d=><span key={d} className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"/>)}</div></div>}<div ref={endRef}/></div>
        <div className="px-2 pb-1.5 flex gap-1 flex-wrap">{['My goals','Feedback themes','Promo readiness'].map(q=><button key={q} onClick={()=>setInput(q)} className="px-2 py-0.5 rounded-full text-[10px] font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">{q}</button>)}</div>
        <div className="p-2 border-t border-gray-100 shrink-0"><div className="flex gap-1.5"><input type="text" placeholder="Ask your PM&D Agent..." className="flex-1 px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs focus:outline-none focus:ring-2 focus:ring-intuit-blue/30" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button onClick={send} className="w-7 h-7 rounded-lg bg-intuit-blue text-white flex items-center justify-center hover:bg-blue-700"><Ico name="send" size={13}/></button></div></div>
      </>}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [page,setPage]=useState('dashboard');const [persona,setPersona]=useState('employee');
  const pages={dashboard:<Dashboard persona={persona}/>,goals:<GoalsCoach/>,feedback:<FeedbackCoach/>,checkin:<CheckInPrep/>,skills:<CraftSkills/>,promotion:<Promotion/>,development:<DevPlan/>};
  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar page={page} setPage={setPage} persona={persona} setPersona={setPersona}/>
      <main className="flex-1 overflow-y-auto">{pages[page]}</main>
      <AgentChat persona={persona}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
