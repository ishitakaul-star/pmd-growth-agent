/* ── MARKDOWN RENDERER ── */
function RenderMD({text}) {
  if (!text) return null;
  const lines = text.split('\n');
  const els = [];
  let buf = [];

  const flush = () => {
    if (buf.length > 0) {
      els.push(<ul key={`ul-${els.length}`} className="pl-4 my-1.5 space-y-1">{buf.map((b,i)=><li key={i} className="text-[13px] leading-relaxed text-white/75 list-disc">{fmt(b)}</li>)}</ul>);
      buf = [];
    }
  };

  const fmt = (t) => {
    const parts = [];
    let idx = 0;
    const re = /(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;
    let m, last = 0;
    while ((m = re.exec(t)) !== null) {
      if (m.index > last) parts.push(<span key={idx++}>{t.slice(last, m.index)}</span>);
      if (m[2]) parts.push(<strong key={idx++} className="font-semibold text-white/90">{m[2]}</strong>);
      else if (m[3]) parts.push(<em key={idx++} className="italic text-white/70">{m[3]}</em>);
      else if (m[4]) parts.push(<code key={idx++} className="bg-white/10 px-1.5 py-0.5 rounded text-[12px] text-brand-200">{m[4]}</code>);
      last = re.lastIndex;
    }
    if (last < t.length) parts.push(<span key={idx++}>{t.slice(last)}</span>);
    return parts.length > 0 ? parts : t;
  };

  lines.forEach((line, i) => {
    const tr = line.trim();
    if (tr.startsWith('- ') || tr.startsWith('• ') || tr.startsWith('* ')) { buf.push(tr.replace(/^[-•*]\s/, '')); return; }
    if (/^\d+\.\s/.test(tr)) { buf.push(tr.replace(/^\d+\.\s/, '')); return; }
    flush();
    if (tr === '') { els.push(<div key={i} className="h-2"/>); return; }
    if (tr.startsWith('### ')) { els.push(<h4 key={i} className="font-semibold text-[13px] text-white/80 mt-3 mb-1">{fmt(tr.slice(4))}</h4>); return; }
    if (tr.startsWith('## ')) { els.push(<h3 key={i} className="font-bold text-[15px] text-white/90 mt-4 mb-1">{fmt(tr.slice(3))}</h3>); return; }
    if (tr.startsWith('# ')) { els.push(<h2 key={i} className="font-bold text-[16px] text-white mt-4 mb-1.5">{fmt(tr.slice(2))}</h2>); return; }
    if (tr.startsWith('---')) { els.push(<hr key={i} className="border-white/10 my-3"/>); return; }
    if (tr.startsWith('> ')) { els.push(<blockquote key={i} className="border-l-2 border-brand-500/40 pl-3 my-2 italic text-[13px] text-white/60">{fmt(tr.slice(2))}</blockquote>); return; }
    if (tr.startsWith('|')) { els.push(<p key={i} className="text-[12px] text-white/50 font-mono my-0.5">{tr}</p>); return; }
    els.push(<p key={i} className="text-[13px] leading-relaxed text-white/75 my-0.5">{fmt(tr)}</p>);
  });
  flush();
  return <div>{els}</div>;
}

                  : `I know each of your ${TEAM.length} reports — their goals, readiness, strengths, and growth areas. How can I help?`}
              </p>
              <div className="grid grid-cols-3 gap-3 w-full max-w-2xl">
                {caps.map((c,i)=>(
                  <button key={i} onClick={()=>send(c.prompt)} className="group p-4 rounded-xl border border-white/[0.06] bg-white/[0.02] hover:bg-white/[0.04] hover:border-white/[0.12] transition-all text-left">
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center mb-2" style={{backgroundColor:`${c.color}12`}}><I name={c.icon} size={16} style={{color:c.color}}/></div>
                    <p className="text-[13px] font-semibold text-white/70 group-hover:text-white/90 transition-colors">{c.label}</p>
                    <p className="text-[11px] text-white/25 mt-0.5">{c.desc}</p>
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="space-y-5">
              {msgs.map((m,i)=>(
                <div key={i} className={`fade-up ${m.role==='user'?'flex justify-end':'flex justify-start'}`}>
                  {m.role==='assistant' && <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center mr-3 shrink-0 mt-0.5"><I name="spark" size={13} className="text-white"/></div>}
                  <div className={`max-w-[85%] ${m.role==='user'?'bg-brand-500 text-white rounded-2xl rounded-br-md px-4 py-3':'text-white/80'}`}>
                    {m.role==='user' ? <p className="text-[13px] leading-relaxed">{m.content}</p> : <RenderMD text={m.content}/>}
                  </div>
                </div>
              ))}
              {loading && (
                <div className="flex items-start fade-up">
                  <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center mr-3 shrink-0"><I name="spark" size={13} className="text-white"/></div>
                  <div className="flex items-center gap-2 py-3"><div className="flex gap-1.5">{[0,1,2].map(d=><span key={d} className="w-2 h-2 bg-brand-400 rounded-full typing-dot"/>)}</div><span className="text-[12px] text-white/25 ml-1">Thinking...</span></div>
                </div>
              )}
              <div ref={endRef}/>
            </div>
          )}
        </div>
      </div>

      {/* Input */}
      <div className="shrink-0 border-t border-white/[0.06]">
        <div className="max-w-4xl mx-auto px-6 py-4">
          {quickPrompts.length > 0 && (
            <div className="flex gap-1.5 mb-3 flex-wrap">
              {quickPrompts.map(q=><button key={q} onClick={()=>send(q)} className="px-3 py-1.5 rounded-full text-[11px] font-medium text-white/25 border border-white/[0.06] hover:border-white/15 hover:text-white/40 hover:bg-white/[0.02] transition-all">{q}</button>)}
            </div>
          )}
          <div className="flex gap-3 items-end">
            <div className="flex-1 relative">
              <textarea ref={inputRef} className="w-full px-4 py-3 pr-12 rounded-xl border border-white/[0.08] text-[13px] bg-white/[0.03] text-white resize-none placeholder:text-white/15 focus:border-brand-500/30 focus:ring-2 focus:ring-brand-500/10 min-h-[48px] max-h-[160px]" placeholder={mode==='employee'?"Ask about your goals, promotion case, craft skills, development...":"Ask about your team, draft feedback, prep 1:1s, assess readiness..."} value={input} onChange={e=>{setInput(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,160)+'px';}} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} rows={1}/>
              <button onClick={()=>send()} disabled={loading||!input.trim()} className="absolute right-2 bottom-2 w-8 h-8 rounded-lg bg-brand-500 text-white flex items-center justify-center hover:bg-brand-600 transition-colors disabled:opacity-20"><I name="send" size={14}/></button>
            </div>
          </div>
          <p className="text-[10px] text-white/10 mt-2.5 text-center">{mode==='employee'?`${ME.personalGoals.length} goals · ${ME.promoReadiness}% Director readiness · ${Object.keys(ME.skills).length} craft pillars`:`${TEAM.length} reports · ${TEAM.reduce((a,t)=>a+t.goals.length,0)} team goals · ${RISKS.length} active risks`} · Will use Claude API if key is available</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
