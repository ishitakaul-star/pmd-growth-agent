/* ═══ MARKDOWN ═══ */
function RenderMD({text}) {
  if (!text) return null;
  const lines = text.split('\n'), els = [];
  let i = 0;
  while (i < lines.length) {
    const L = lines[i];
    if (L.startsWith('### ')) els.push(<h3 key={i} className="text-sm font-semibold text-slate-200 mt-3 mb-1">{L.slice(4)}</h3>);
    else if (L.startsWith('## ')) els.push(<h2 key={i} className="text-base font-semibold text-white mt-3 mb-1">{L.slice(3)}</h2>);
    else if (L.startsWith('---')) els.push(<hr key={i} className="my-3 border-slate-700"/>);
    else if (L.startsWith('- ')||L.startsWith('* ')) {
      const items=[];
      while(i<lines.length&&(lines[i].startsWith('- ')||lines[i].startsWith('* '))) { items.push(<li key={i} className="ml-4 text-sm text-slate-300 leading-relaxed">{fmt(lines[i].slice(2))}</li>); i++; }
      els.push(<ul key={`u${i}`} className="list-disc my-1 space-y-0.5">{items}</ul>); continue;
    }
    else if (L.match(/^\d+\.\s/)) {
      const items=[];
      while(i<lines.length&&lines[i].match(/^\d+\.\s/)) { items.push(<li key={i} className="ml-4 text-sm text-slate-300 leading-relaxed">{fmt(lines[i].replace(/^\d+\.\s/,''))}</li>); i++; }
      els.push(<ol key={`o${i}`} className="list-decimal my-1 space-y-0.5">{items}</ol>); continue;
    }
    else if (L.startsWith('> ')) els.push(<blockquote key={i} className="border-l-2 border-brand-400 pl-3 my-2 text-sm text-slate-400 italic">{fmt(L.slice(2))}</blockquote>);
    else if (L.trim()) els.push(<p key={i} className="text-sm text-slate-300 leading-relaxed my-1">{fmt(L)}</p>);
    i++;
  }
  return <div>{els}</div>;
}
function fmt(t) {
  const p=[]; let r=t, k=0;
  while(r.length>0) {
    const b=r.match(/\*\*(.+?)\*\*/), c=r.match(/`(.+?)`/), it=r.match(/\*(.+?)\*/);
    let m=null, idx=r.length;
    if(b&&b.index<idx){m='b';idx=b.index;} if(c&&c.index<idx){m='c';idx=c.index;} if(it&&it.index<idx&&m!=='b'){m='i';idx=it.index;}
    if(!m){p.push(r);break;}
    if(idx>0)p.push(r.slice(0,idx));
    if(m==='b'){p.push(<strong key={k++} className="font-semibold text-white">{b[1]}</strong>);r=r.slice(idx+b[0].length);}
    else if(m==='c'){p.push(<code key={k++} className="bg-slate-800 text-brand-300 px-1 rounded text-xs">{c[1]}</code>);r=r.slice(idx+c[0].length);}
    else{p.push(<em key={k++} className="italic text-slate-400">{it[1]}</em>);r=r.slice(idx+it[0].length);}
  }
  return p;
}

/* ═══ FILE READER UTIL ═══ */
function readFileAsText(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = () => resolve('');
    reader.readAsText(file);
  });
}

/* ═══ CONTEXT PANEL ═══ */
function ContextPanel({docs, setDocs, onClose}) {
  const [paste, setPaste] = useState('');
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef(null);

  const addDoc = (title, content) => {
    if(!content.trim()) return;
    const next = [...docs, {title: title||`Doc ${docs.length+1}`, content: content.trim(), ts: Date.now()}];
    setDocs(next);
    localStorage.setItem('pmd_context_docs', JSON.stringify(next));
  };

  const removeDoc = (i) => {
    const next = docs.filter((_,idx) => idx!==i);
    setDocs(next);
    localStorage.setItem('pmd_context_docs', JSON.stringify(next));
  };

  const handleFiles = async (files) => {
    for (const f of files) {
      if (f.size > 500000) continue; // 500KB limit per file
      const text = await readFileAsText(f);
      if (text.trim()) addDoc(f.name, text);
    }
  };

  const handleDrop = (e) => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" onClick={onClose}>
      <div className="glass rounded-2xl p-5 w-full max-w-lg max-h-[85vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <h2 className="text-base font-semibold text-white">Context Documents</h2>
            <p className="text-[11px] text-slate-400">Upload .txt/.csv/.md files or paste text. Used to ground responses.</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white transition">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
          </button>
        </div>

        {/* Drop zone */}
        <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={handleDrop}
          onClick={()=>fileRef.current?.click()}
          className={`border-2 border-dashed rounded-xl p-4 text-center cursor-pointer transition mb-3 ${dragging?'border-brand-400 bg-brand-400/10':'border-slate-700 hover:border-slate-500'}`}>
          <input ref={fileRef} type="file" multiple accept=".txt,.md,.csv,.json,.log,.tsv" className="hidden" onChange={e=>handleFiles(e.target.files)}/>
          <svg className="mx-auto mb-1.5 text-slate-500" width="24" height="24" fill="none" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <p className="text-xs text-slate-400">Drop files here or click to browse</p>
          <p className="text-[10px] text-slate-600 mt-0.5">.txt, .md, .csv, .json — 500KB max per file</p>
        </div>

        {/* Paste area */}
        <div className="mb-3">
          <label className="text-[11px] text-slate-400 mb-1 block">Or paste text directly</label>
          <textarea value={paste} onChange={e=>setPaste(e.target.value)} rows={4}
            placeholder={"Paste project updates, strategy docs, weekly updates, team context...\n\nThis text will be used to personalize your growth recommendations."}
            className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:border-brand-400 outline-none resize-none"/>
          {paste.trim() && (
            <button onClick={()=>{addDoc('Pasted context', paste); setPaste('');}}
              className="mt-1.5 px-3 py-1.5 rounded-lg bg-brand-400 text-white text-xs font-medium hover:bg-brand-500 transition">
              Add context
            </button>
          )}
        </div>

        {/* Saved docs */}
        {docs.length > 0 && (
          <div>
            <label className="text-[11px] text-slate-400 mb-1.5 block">Saved context ({docs.length})</label>
            <div className="space-y-1.5">
              {docs.map((doc,i) => (
                <div key={i} className="flex items-start gap-2 bg-slate-800/50 rounded-lg p-2.5">
                  <svg className="text-brand-300 mt-0.5 flex-shrink-0" width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" strokeWidth="2"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                  <div className="flex-1 min-w-0">
                    <p className="text-xs font-medium text-white truncate">{doc.title}</p>
                    <p className="text-[10px] text-slate-500 mt-0.5">{doc.content.length.toLocaleString()} chars</p>
                  </div>
                  <button onClick={()=>removeDoc(i)} className="text-slate-500 hover:text-rose-400 transition flex-shrink-0" title="Remove">
                    <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}

        <p className="text-[10px] text-slate-600 mt-3 text-center">All data stays in your browser (localStorage)</p>
      </div>
    </div>
  );
}

    {label:'Technology Fluency', pct:92, color:'#F59E0B', items:[
      {t:'GenAI integration — Promo Tool, RAI + security approval',done:true},
      {t:'ServiceNow Now Assist Dynamic Sensitivity Routing',done:true},
      {t:'AI-Enabled Superagency frameworks (CVI, ACE, Flash Talent)',done:true},
      {t:'Present AI patterns at company-wide tech forum',done:false},
      {t:'Publish AI POV beyond T4i',done:false},
    ]},
    {label:'Org Effectiveness', pct:93, color:'#FB7185', items:[
      {t:'7 PMs + 2 supporting across 5 domains',done:true},
      {t:'Expanded to own ALL HR Product Tech for T4i',done:true},
      {t:'Cross-functional: ServiceNow, Workday, Avature, Learning, Expert Hiring',done:true},
      {t:'Visible cross-BU influence outside T4i',done:false},
    ]},
  ];

  return (
    <div className="fade-up pt-4 px-1 space-y-4 pb-8">
      {/* Overall ring */}
      <div className="glass rounded-2xl p-5">
        <div className="flex items-center gap-5">
          <div className="relative flex-shrink-0">
            <svg width="90" height="90" viewBox="0 0 90 90">
              <circle cx="45" cy="45" r="38" fill="none" stroke="#1E293B" strokeWidth="7"/>
              <circle cx="45" cy="45" r="38" fill="none" stroke="#365EDC" strokeWidth="7"
                strokeDasharray={`${2*Math.PI*38*overall/100} ${2*Math.PI*38*(1-overall/100)}`}
                strokeDashoffset={2*Math.PI*38*0.25}
                strokeLinecap="round" className="transition-all duration-1000"/>
            </svg>
            <div className="absolute inset-0 flex items-center justify-center">
              <span className="text-xl font-bold text-white">{overall}%</span>
            </div>
          </div>
          <div>
            <h2 className="text-base font-semibold text-white">Promo Readiness</h2>
            <p className="text-xs text-slate-400 mt-0.5">{me.role} → {me.target}</p>
            <p className="text-[11px] text-mint-400 mt-1.5 font-medium">Almost there — close remaining gaps to lock it in</p>
          </div>
        </div>
      </div>

      {/* Pillar cards */}
      {milestones.map((m,i) => {
        const done = m.items.filter(x=>x.done).length;
        const total = m.items.length;
        return (
          <div key={i} className="glass rounded-xl p-4">
            <div className="flex items-center justify-between mb-2.5">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-full" style={{backgroundColor:m.color}}/>
                <span className="text-sm font-semibold text-white">{m.label}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-[11px] text-slate-400">{done}/{total}</span>
                <span className="text-xs font-bold" style={{color:m.color}}>{m.pct}%</span>
              </div>
            </div>
            {/* Progress bar */}
            <div className="h-1.5 rounded-full bg-slate-800 mb-3">
              <div className="h-full rounded-full transition-all duration-700" style={{width:`${m.pct}%`, backgroundColor:m.color}}/>
            </div>
            {/* Items */}
            <div className="space-y-1.5">
              {m.items.map((item,j) => (
                <div key={j} className="flex items-start gap-2">
                  {item.done
                    ? <svg className="flex-shrink-0 mt-0.5" width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill={m.color} opacity="0.2"/><path d="M9 12l2 2 4-4" stroke={m.color} strokeWidth="2" strokeLinecap="round"/></svg>
                    : <svg className="flex-shrink-0 mt-0.5 text-slate-600" width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.5"/></svg>
                  }
                  <span className={`text-[12px] leading-relaxed ${item.done?'text-slate-300':'text-slate-500'}`}>{item.t}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {/* What's left */}
      <div className="glass rounded-xl p-4 border-l-2 border-amber-400">
        <h3 className="text-sm font-semibold text-white mb-2">To reach 100%</h3>
        <div className="space-y-1.5 text-[12px] text-slate-300">
          <p>1. <strong className="text-white">Cross-BU visibility</strong> — present Enterprise Vision or Superagency frameworks to audiences outside T4i</p>
          <p>2. <strong className="text-white">Quantified impact</strong> — build $ and efficiency metrics across all pillars (ServiceNow ROI, CK cost avoidance, TA consolidation savings)</p>
          <p>3. <strong className="text-white">AI thought leadership</strong> — present at company-wide tech forum, publish AI POV externally</p>
          <p>4. <strong className="text-white">Organizational influence</strong> — shape a roadmap or strategy decision outside your org</p>
        </div>
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App() {
  const [me, setMe] = useState(null);
  const [ready, setReady] = useState(false);
  const [mode, setMode] = useState('employee');
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [welcome, setWelcome] = useState(true);
  const [showCtx, setShowCtx] = useState(false);
  const [ctxDocs, setCtxDocs] = useState([]);
  const end = useRef(null);
  const inp = useRef(null);

  useEffect(()=>{
    const s=localStorage.getItem('pmd_profile'); if(s){setMe(JSON.parse(s));setReady(true);}
    try { const c=localStorage.getItem('pmd_context_docs'); if(c) setCtxDocs(JSON.parse(c)); } catch(e){}
  },[]);
  useEffect(()=>{ end.current?.scrollIntoView({behavior:'smooth'}); },[msgs,loading]);

  const team = me?.name===DEFAULT_ME.name ? DEFAULT_TEAM : [];
  const risks = me?.name===DEFAULT_ME.name ? RISKS : [];

  const go = (m) => { setMode(m); setMsgs([]); setWelcome(true); };

  const send = async (text) => {
    const msg = text||input.trim(); if(!msg||loading) return;
    setInput(''); setWelcome(false);
    setMsgs(p=>[...p,{r:'u',c:msg}]); setLoading(true);
    await new Promise(r=>setTimeout(r, 250+Math.random()*400));
    const ctx = ctxDocs.map(d=>d.content).join('\n\n');
    setMsgs(p=>[...p,{r:'a',c:respond(msg, mode, me||DEFAULT_ME, team, risks, ctx)}]);
    setLoading(false);
    setTimeout(()=>inp.current?.focus(),100);
  };

  const reset = () => { localStorage.removeItem('pmd_profile'); localStorage.removeItem('pmd_context_docs'); setMe(null); setReady(false); setMsgs([]); setWelcome(true); setCtxDocs([]); };

  if (!ready) return <Setup onDone={p=>{ if(p)setMe(p); else setMe(DEFAULT_ME); setReady(true); }} />;

  const eg = mode==='employee'
    ? [{l:'My Goals',p:'Show my goals'},{l:'Outcomes',p:'What have I delivered?'},{l:'Craft Skills',p:'Assess my craft skills'},{l:'Development',p:'Where should I invest?'},{l:'Strategy Work',p:'My authored work'}]
    : [{l:'Team Status',p:'Team overview'},{l:'Risks',p:'Show risks'},{l:'Promo Targets',p:'Promo targets'},{l:'Feedback',p:'Help draft feedback'},{l:'Development',p:'Development priorities'}];

  return (
    <div className="min-h-screen flex flex-col">
      <header className="bg-brand-800/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-30">
        <div className="max-w-4xl mx-auto px-4 py-2.5 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg bg-brand-400 flex items-center justify-center">
              <span className="text-white text-xs font-bold">G</span>
            </div>
            <div>
              <h1 className="text-sm font-semibold text-white leading-tight">PM&D Growth Agent</h1>
              <p className="text-[10px] text-slate-400">{me?.name} · {me?.role}</p>
            </div>
          </div>
          <div className="flex items-center gap-2.5">
            <div className="flex bg-slate-800/60 rounded-full p-0.5">
              <button onClick={()=>go('employee')} className={`px-3 py-1 rounded-full text-xs font-medium transition ${mode==='employee'?'bg-brand-400 text-white':'text-slate-400 hover:text-white'}`}>My Growth</button>
              <button onClick={()=>go('promo')} className={`px-3 py-1 rounded-full text-xs font-medium transition ${mode==='promo'?'bg-brand-400 text-white':'text-slate-400 hover:text-white'}`}>Promo</button>
              {team.length>0 && <button onClick={()=>go('manager')} className={`px-3 py-1 rounded-full text-xs font-medium transition ${mode==='manager'?'bg-brand-400 text-white':'text-slate-400 hover:text-white'}`}>My Team</button>}
            </div>
            <button onClick={()=>setShowCtx(true)} className="text-slate-500 hover:text-slate-300 relative" title="Add context">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" strokeWidth="2"/><path d="M14 2v6h6M12 18v-6M9 15h6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              {ctxDocs.length > 0 && <span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-brand-400 text-[7px] text-white flex items-center justify-center font-bold">{ctxDocs.length}</span>}
            </button>
            <button onClick={reset} className="text-slate-500 hover:text-slate-300" title="Switch profile">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
          </div>
        </div>
      </header>

      <div className="flex-1 max-w-4xl w-full mx-auto px-4 pb-36">
        {mode==='promo' && <PromoTracker me={me||DEFAULT_ME} team={team}/>}
        {mode!=='promo' && welcome && (
          <div className="fade-up pt-6 pb-3">
            <div className="text-center mb-4">
              <h2 className="text-lg font-semibold text-white">
                {mode==='employee'?`${me?.name?.split(' ')[0]}'s Growth`:'Team Dashboard'}
              </h2>
              <p className="text-slate-500 text-xs">
                {mode==='employee'?(me?.target?`Path to ${me.target}`:'Your growth companion'):`${team.length} PMs`}
              </p>
            </div>

            {mode==='manager' && team.length>0 && (
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-1.5 mb-4">
                {team.map((t,i) => {
                  const ar=(t.projects||[]).filter(p=>p.s==='at-risk'||p.s==='off-track').length;
                  const dot=ar>2?'bg-rose-400':ar>0?'bg-amber-400':'bg-mint-400';
                  return (
                    <button key={i} onClick={()=>send(`How is ${t.name.split(' ')[0]} doing?`)} className="card-hover glass rounded-lg p-2.5 text-left">
                      <div className="flex items-center gap-1.5 mb-0.5">
                        <div className={`w-1.5 h-1.5 rounded-full ${dot}`}/>
                        <span className="text-[11px] font-semibold text-white truncate">{t.name.split(' ')[0]}</span>
                      </div>
                      <p className="text-[9px] text-slate-400 truncate">{t.role} · {t.area.split('—')[0].trim()}</p>
                      {t.reportsTo && <p className="text-[8px] text-brand-300 mt-0.5">{t.reportsTo}</p>}
                    </button>
                  );
                })}
              </div>
            )}

            <div className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-w-xl mx-auto">
              {eg.map((g,i)=>(<button key={i} onClick={()=>send(g.p)} className="card-hover glass rounded-lg px-3 py-2.5 text-left">
                <span className="text-xs font-medium text-slate-200">{g.l}</span>
              </button>))}
            </div>
          </div>
        )}

        {mode!=='promo' && msgs.map((m,i) => (
          <div key={i} className={`msg-enter ${m.r==='u'?'flex justify-end':''} mt-3`}>
            {m.r==='u' ? (
              <div className="max-w-[75%] bg-brand-400 rounded-2xl rounded-br-sm px-4 py-2"><p className="text-sm text-white">{m.c}</p></div>
            ) : (
              <div className="glass rounded-2xl px-4 py-3"><RenderMD text={m.c}/></div>
            )}
          </div>
        ))}

        {mode!=='promo' && loading && <div className="mt-3 msg-enter"><div className="glass rounded-2xl px-4 py-3 inline-flex gap-1.5">
          <div className="w-1.5 h-1.5 rounded-full bg-brand-300 typing-dot"/><div className="w-1.5 h-1.5 rounded-full bg-brand-300 typing-dot"/><div className="w-1.5 h-1.5 rounded-full bg-brand-300 typing-dot"/>
        </div></div>}
        <div ref={end}/>
      </div>

      {mode!=='promo' && <div className="fixed bottom-0 inset-x-0 bg-gradient-to-t from-brand-900 via-brand-900/95 to-transparent pt-5 pb-3 px-4">
        <div className="max-w-4xl mx-auto">
          {!welcome && (
            <div className="flex gap-1.5 mb-2 overflow-x-auto">
              {(mode==='employee'?['Goals','Outcomes','Craft skills','Growth areas','Development']:['Overview','Risks','Development','Feedback','Team health']).map((s,i)=>(
                <button key={i} onClick={()=>send(s)} className="whitespace-nowrap px-2.5 py-1 rounded-full text-[11px] font-medium bg-slate-800/60 border border-slate-700 text-slate-400 hover:text-white hover:border-brand-400 transition">{s}</button>
              ))}
            </div>
          )}
          <div className="flex gap-2">
            <div className="flex-1 glass rounded-xl focus-within:border-brand-400 transition">
              <input ref={inp} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder={mode==='employee'?'Ask about goals, skills, growth...':'Ask about team, risks, feedback...'}
                className="w-full px-4 py-2.5 bg-transparent text-sm text-white outline-none rounded-xl"/>
            </div>
            <button onClick={()=>send()} disabled={!input.trim()||loading}
              className="w-9 h-9 rounded-xl bg-brand-400 text-white flex items-center justify-center hover:bg-brand-500 disabled:opacity-30 transition flex-shrink-0">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>}
      {showCtx && <ContextPanel docs={ctxDocs} setDocs={setCtxDocs} onClose={()=>setShowCtx(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
