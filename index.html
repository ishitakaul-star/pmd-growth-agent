/* ── MARKDOWN RENDERER ── */
function RenderMD({text}) {
  if (!text) return null;
  const lines = text.split('\n');
  const elements = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('### ')) { elements.push(<h3 key={i} className="text-sm font-semibold text-slate-200 mt-3 mb-1">{line.slice(4)}</h3>); }
    else if (line.startsWith('## ')) { elements.push(<h2 key={i} className="text-base font-semibold text-white mt-3 mb-1.5">{line.slice(3)}</h2>); }
    else if (line.startsWith('# ')) { elements.push(<h1 key={i} className="text-lg font-bold text-white mt-3 mb-2">{line.slice(2)}</h1>); }
    else if (line.startsWith('---')) { elements.push(<hr key={i} className="my-3 border-slate-700" />); }
    else if (line.startsWith('- ') || line.startsWith('* ')) {
      const items = [];
      while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
        items.push(<li key={i} className="ml-4 text-sm text-slate-300 leading-relaxed">{fmtInline(lines[i].slice(2))}</li>);
        i++;
      }
      elements.push(<ul key={`ul-${i}`} className="list-disc my-1 space-y-0.5">{items}</ul>);
      continue;
    }
    else if (line.match(/^\d+\.\s/)) {
      const items = [];
      while (i < lines.length && lines[i].match(/^\d+\.\s/)) {
        items.push(<li key={i} className="ml-4 text-sm text-slate-300 leading-relaxed">{fmtInline(lines[i].replace(/^\d+\.\s/,''))}</li>);
        i++;
      }
      elements.push(<ol key={`ol-${i}`} className="list-decimal my-1 space-y-0.5">{items}</ol>);
      continue;
    }
    else if (line.startsWith('> ')) { elements.push(<blockquote key={i} className="border-l-2 border-brand-400 pl-3 my-2 text-sm text-slate-400 italic">{fmtInline(line.slice(2))}</blockquote>); }
    else if (line.trim()) { elements.push(<p key={i} className="text-sm text-slate-300 leading-relaxed my-1">{fmtInline(line)}</p>); }
    i++;
  }
  return <div>{elements}</div>;
}
function fmtInline(t) {
  const parts = []; let rem = t; let k = 0;
  while (rem.length > 0) {
    const b = rem.match(/\*\*(.+?)\*\*/); const c = rem.match(/`(.+?)`/); const it = rem.match(/\*(.+?)\*/);
    let fm=null, fi=rem.length;
    if (b && b.index<fi) {fm='b';fi=b.index;} if (c && c.index<fi) {fm='c';fi=c.index;} if (it && it.index<fi && fm!=='b') {fm='i';fi=it.index;}
    if (!fm) {parts.push(rem);break;}
    if (fi>0) parts.push(rem.slice(0,fi));
    if (fm==='b') {parts.push(<strong key={k++} className="font-semibold text-white">{b[1]}</strong>);rem=rem.slice(fi+b[0].length);}
    else if (fm==='c') {parts.push(<code key={k++} className="bg-slate-800 text-brand-300 px-1 py-0.5 rounded text-xs font-mono">{c[1]}</code>);rem=rem.slice(fi+c[0].length);}
    else {parts.push(<em key={k++} className="italic text-slate-400">{it[1]}</em>);rem=rem.slice(fi+it[0].length);}
  }
  return parts;
}

          )}
          <div className="flex gap-2 items-end">
            <div className="flex-1 glass rounded-xl focus-within:border-brand-400 transition-all">
              <input ref={inputRef} value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder={mode==='employee'?'Ask about your growth, goals, craft skills...':'Ask about your team, risks, feedback...'}
                className="w-full px-4 py-3 bg-transparent text-sm text-white outline-none rounded-xl" />
            </div>
            <button onClick={()=>send()}
              disabled={!input.trim()||loading}
              className="w-10 h-10 rounded-xl bg-brand-400 text-white flex items-center justify-center hover:bg-brand-500 disabled:opacity-30 transition-colors flex-shrink-0">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
          <p className="text-[10px] text-slate-600 text-center mt-2">Portfolio data through March 2026 | Your data stays in your browser</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
