const CLAUDE_MODEL = 'claude-haiku-4-5-20251001';

async function callClaude(messages, mode) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) throw new Error('NO_KEY');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 2048, system: buildSystemPrompt(mode), messages }),
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `API error ${res.status}`); }
  const data = await res.json();
  return data.content[0].text;
}

/* ── MARKDOWN RENDERER ── */
function RenderMD({text}) {
  if (!text) return null;
  const lines = text.split('\n');
  const els = [];
  let buf = [];

  const flush = () => {
    if (buf.length > 0) {
      els.push(<ul key={`ul-${els.length}`} className="pl-4 my-1.5 space-y-1">{buf.map((b,i)=><li key={i} className="text-[13px] leading-relaxed text-white/75 list-disc">{fmt(b)}</li>)}</ul>);
      buf = [];
    }
  };

  const fmt = (t) => {
    const parts = [];
    let idx = 0;
    const re = /(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;
    let m, last = 0;
    while ((m = re.exec(t)) !== null) {
      if (m.index > last) parts.push(<span key={idx++}>{t.slice(last, m.index)}</span>);
      if (m[2]) parts.push(<strong key={idx++} className="font-semibold text-white/90">{m[2]}</strong>);
      else if (m[3]) parts.push(<em key={idx++} className="italic text-white/70">{m[3]}</em>);
      else if (m[4]) parts.push(<code key={idx++} className="bg-white/10 px-1.5 py-0.5 rounded text-[12px] text-brand-200">{m[4]}</code>);
      last = re.lastIndex;
    }
    if (last < t.length) parts.push(<span key={idx++}>{t.slice(last)}</span>);
    return parts.length > 0 ? parts : t;
  };

  lines.forEach((line, i) => {
    const tr = line.trim();
    if (tr.startsWith('- ') || tr.startsWith('• ') || tr.startsWith('* ')) { buf.push(tr.replace(/^[-•*]\s/, '')); return; }
    if (/^\d+\.\s/.test(tr)) { buf.push(tr.replace(/^\d+\.\s/, '')); return; }
    flush();
    if (tr === '') { els.push(<div key={i} className="h-2"/>); return; }
    if (tr.startsWith('### ')) { els.push(<h4 key={i} className="font-semibold text-[13px] text-white/80 mt-3 mb-1">{fmt(tr.slice(4))}</h4>); return; }
    if (tr.startsWith('## ')) { els.push(<h3 key={i} className="font-bold text-[14px] text-white/90 mt-3 mb-1">{fmt(tr.slice(3))}</h3>); return; }
    if (tr.startsWith('# ')) { els.push(<h2 key={i} className="font-bold text-[16px] text-white mt-4 mb-1.5">{fmt(tr.slice(2))}</h2>); return; }
    els.push(<p key={i} className="text-[13px] leading-relaxed text-white/75 my-0.5">{fmt(tr)}</p>);
  });
  flush();
  return <div>{els}</div>;
}

    </div>
  );
}

/* ── CONTEXT PANEL — MANAGER ── */
function ManagerContext() {
  return (
    <div>
      <div className="grid grid-cols-6 gap-3 mb-4">
        {TEAM.map((t,i)=>(
          <div key={i} className="rounded-xl border border-white/[0.06] bg-white/[0.02] p-3">
            <div className="flex items-center gap-2 mb-2"><div className="w-6 h-6 rounded-full bg-brand-500/20 flex items-center justify-center text-[9px] font-bold text-brand-300">{t.name.split(' ')[0][0]}</div><div><p className="text-[11px] text-white/70 font-semibold">{t.name.split(' ')[0]}</p><p className="text-[9px] text-white/25">{t.role}</p></div></div>
            <p className="text-[10px] text-white/35 line-clamp-2 mb-2">{t.area}</p>
            <div className="flex items-center gap-1.5"><div className="flex-1 bg-white/10 rounded-full h-1"><div className="bg-brand-500 h-1 rounded-full" style={{width:`${t.readiness}%`}}/></div><span className="text-[9px] text-white/25">{t.readiness}%</span></div>
            {t.subReports && <p className="text-[9px] text-white/20 mt-1.5">+{t.subReports.join(', ')}</p>}
          </div>
        ))}
      </div>
      <div>
        <p className="text-[10px] text-white/25 uppercase tracking-wider font-semibold mb-1.5">Portfolio Risks</p>
        <div className="flex flex-wrap gap-2">{RISKS.slice(0,3).map((r,i)=><span key={i} className="text-[10px] text-amber-300/70 bg-amber-500/10 border border-amber-500/15 px-2 py-1 rounded-lg">{r.split(':')[0]}</span>)}</div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [mode,setMode]=useState('employee');
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [showKey,setShowKey]=useState(!localStorage.getItem('anthropic_api_key'));
  const [showCtx,setShowCtx]=useState(false);
  const endRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,loading]);
  useEffect(()=>{if(!showKey)inputRef.current?.focus();},[showKey]);

  // Clear chat when switching modes
  const switchMode = (newMode) => {
    if (newMode !== mode) { setMode(newMode); setMsgs([]); }
  };

  const saveKey = (key) => {
    localStorage.setItem('anthropic_api_key', key === 'SKIP' ? '' : key);
    setShowKey(false);
  };

  const send = async (text) => {
    const userMsg = (text || input).trim();
    if (!userMsg || loading) return;
    setInput('');
    const ta = document.querySelector('textarea');
    if (ta) ta.style.height = 'auto';
    setMsgs(p=>[...p,{role:'user',content:userMsg}]);
    setLoading(true);
    try {
      const apiMsgs = [...msgs, {role:'user',content:userMsg}].map(m=>({role:m.role,content:m.content}));
      const result = await callClaude(apiMsgs, mode);
      setMsgs(p=>[...p,{role:'assistant',content:result}]);
    } catch(e) {
      const errMsg = e.message === 'NO_KEY' ? 'Please add your API key. Click the key icon in the header.' : 'Error: ' + e.message;
      setMsgs(p=>[...p,{role:'assistant',content:errMsg}]);
    }
    setLoading(false);
  };

  const empCaps = [
    {icon:'award',label:'Promotion Case',prompt:'Assess my promotion readiness for Director. What evidence do I have and what gaps remain?',color:'#EC4899',desc:'Director readiness'},
    {icon:'target',label:'My Goals',prompt:'Review my personal goals and tell me what needs attention to build my Director case.',color:'#0077C5',desc:'Track personal goals'},
    {icon:'layers',label:'Craft Skills',prompt:'Analyze my craft skills against the Director rubric. Where are my gaps and how do I close them?',color:'#F59E0B',desc:'Assess against rubric'},
    {icon:'trend',label:'Development',prompt:'Create a 90-day development plan to accelerate my Director readiness. Focus on Org Effectiveness and Technology Fluency gaps.',color:'#14B8A6',desc:'Growth plan'},
    {icon:'zap',label:'Vision Strategy',prompt:'How can I leverage the Enterprise Vision Strategy I delivered to build my case for Director? What should I do next with it?',color:'#8B5CF6',desc:'Leverage key wins'},
    {icon:'book',label:'Feedback Review',prompt:'Analyze the feedback I have received and identify themes. What should I act on for my Director case?',color:'#10B981',desc:'Feedback themes'},
  ];

  const mgrCaps = [
    {icon:'users',label:'Team Overview',prompt:'Give me a status overview of my entire team — each person, their goals, readiness, and what needs my attention.',color:'#0077C5',desc:'Full team status'},
    {icon:'msg',label:'Draft Feedback',prompt:'Help me draft SBI feedback for each of my direct reports based on their recent work.',color:'#10B981',desc:'SBI for any report'},
    {icon:'cal',label:'1:1 Prep',prompt:'Prepare my 1:1 agendas for this week. I have meetings with Navneet, Tammy, and Pavel. Prioritize by risk.',color:'#8B5CF6',desc:'Auto-generate agendas'},
    {icon:'award',label:'Team Readiness',prompt:'Assess promotion readiness for each of my direct reports. Who is closest and what do they need?',color:'#EC4899',desc:'Promo readiness'},
    {icon:'alert',label:'Risk Review',prompt:'What are the biggest risks across my portfolio right now? Prioritize and suggest mitigations.',color:'#EF4444',desc:'CRAIDs & blockers'},
    {icon:'trend',label:'Team Development',prompt:'Create development plans for my team. Who should I invest the most coaching time in?',color:'#14B8A6',desc:'Coaching priorities'},
  ];

  const caps = mode === 'employee' ? empCaps : mgrCaps;

  const quickPrompts = msgs.length > 0 ? (mode === 'employee' ? [
    'What should I focus on this week?',
    'How do I strengthen Org Effectiveness?',
    'Draft my Director promotion narrative',
    'How can I increase AI-first visibility?',
  ] : [
    'Who needs my attention most?',
    'Draft feedback for Tammy on Avature',
    'Prep my 1:1 with Pavel on Promotions R1',
    'Which team member is closest to promo?',
    'Summarize portfolio risks',
    'Write feedback for Navneet on CAMP',
  ]) : [];

  return (
    <div className="h-screen flex flex-col bg-brand-900">
      {showKey && <ApiKeySetup onSave={saveKey}/>}

      {/* Header */}
      <header className="shrink-0 border-b border-white/[0.06]">
        <div className="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center agent-glow"><I name="spark" size={18} className="text-white"/></div>
            <div><h1 className="text-[15px] font-bold text-white tracking-tight">PM&D Growth Agent</h1><p className="text-[11px] text-white/25">Powered by Claude AI · {ME.name} · {ME.role}</p></div>
          </div>
          <div className="flex items-center gap-2">
            {/* Mode Toggle */}
            <div className="flex bg-white/[0.06] rounded-lg p-0.5">
              <button onClick={()=>switchMode('employee')} className={`px-3 py-1.5 rounded-md text-[11px] font-medium transition-all flex items-center gap-1.5 ${mode==='employee'?'bg-brand-500 text-white shadow-lg shadow-brand-500/20':'text-white/30 hover:text-white/50'}`}><I name="user" size={12}/> My Growth</button>
              <button onClick={()=>switchMode('manager')} className={`px-3 py-1.5 rounded-md text-[11px] font-medium transition-all flex items-center gap-1.5 ${mode==='manager'?'bg-brand-500 text-white shadow-lg shadow-brand-500/20':'text-white/30 hover:text-white/50'}`}><I name="users" size={12}/> My Team</button>
            </div>
            <button onClick={()=>setShowCtx(!showCtx)} className={`px-2.5 py-1.5 rounded-lg text-[11px] font-medium border transition-all ${showCtx?'text-white/60 border-white/15 bg-white/5':'text-white/25 border-white/[0.06] hover:bg-white/5'}`}>Context</button>
            <button onClick={()=>setShowKey(true)} className="p-2 rounded-lg text-white/15 hover:text-white/40 hover:bg-white/5 transition-all"><I name="key" size={14}/></button>
          </div>
        </div>
      </header>

      {/* Context Panel */}
      {showCtx && (
        <div className="shrink-0 border-b border-white/[0.06] bg-white/[0.015] fade-up">
          <div className="max-w-4xl mx-auto px-6 py-4">
            {mode === 'employee' ? <EmployeeContext/> : <ManagerContext/>}
          </div>
        </div>
      )}

      {/* Messages */}
      <div className="flex-1 overflow-y-auto">
        <div className="max-w-4xl mx-auto px-6 py-6">
          {msgs.length === 0 ? (
            <div className="flex flex-col items-center justify-center min-h-[55vh]">
              <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center mb-6 agent-glow"><I name="spark" size={28} className="text-white"/></div>
              <h2 className="text-[24px] font-bold text-white mb-2 tracking-tight">
                {mode === 'employee' ? 'Your growth toward Director' : 'Your team at a glance'}
              </h2>
              <p className="text-white/30 text-[14px] mb-8 text-center max-w-lg leading-relaxed">
                {mode === 'employee'
                  ? "I know your goals, craft skills, feedback, wins, and promotion trajectory. Let's build your Director case."
                  : `I know each of your ${TEAM.length} reports — their goals, readiness, strengths, and growth areas. How can I help?`}
              </p>
              <div className="grid grid-cols-3 gap-3 w-full max-w-2xl">
                {caps.map((c,i)=>(
                  <button key={i} onClick={()=>send(c.prompt)} className="group p-4 rounded-xl border border-white/[0.06] bg-white/[0.02] hover:bg-white/[0.04] hover:border-white/[0.12] transition-all text-left">
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center mb-2" style={{backgroundColor:`${c.color}12`}}><I name={c.icon} size={16} style={{color:c.color}}/></div>
                    <p className="text-[13px] font-semibold text-white/70 group-hover:text-white/90 transition-colors">{c.label}</p>
                    <p className="text-[11px] text-white/25 mt-0.5">{c.desc}</p>
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="space-y-5">
              {msgs.map((m,i)=>(
                <div key={i} className={`fade-up ${m.role==='user'?'flex justify-end':'flex justify-start'}`}>
                  {m.role==='assistant' && <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center mr-3 shrink-0 mt-0.5"><I name="spark" size={13} className="text-white"/></div>}
                  <div className={`max-w-[85%] ${m.role==='user'?'bg-brand-500 text-white rounded-2xl rounded-br-md px-4 py-3':'text-white/80'}`}>
                    {m.role==='user' ? <p className="text-[13px] leading-relaxed">{m.content}</p> : <RenderMD text={m.content}/>}
                  </div>
                </div>
              ))}
              {loading && (
                <div className="flex items-start fade-up">
                  <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center mr-3 shrink-0"><I name="spark" size={13} className="text-white"/></div>
                  <div className="flex items-center gap-2 py-3"><div className="flex gap-1.5">{[0,1,2].map(d=><span key={d} className="w-2 h-2 bg-brand-400 rounded-full typing-dot"/>)}</div><span className="text-[12px] text-white/25 ml-1">Thinking...</span></div>
                </div>
              )}
              <div ref={endRef}/>
            </div>
          )}
        </div>
      </div>

      {/* Input */}
      <div className="shrink-0 border-t border-white/[0.06]">
        <div className="max-w-4xl mx-auto px-6 py-4">
          {quickPrompts.length > 0 && (
            <div className="flex gap-1.5 mb-3 flex-wrap">
              {quickPrompts.map(q=><button key={q} onClick={()=>send(q)} className="px-3 py-1.5 rounded-full text-[11px] font-medium text-white/25 border border-white/[0.06] hover:border-white/15 hover:text-white/40 hover:bg-white/[0.02] transition-all">{q}</button>)}
            </div>
          )}
          <div className="flex gap-3 items-end">
            <div className="flex-1 relative">
              <textarea ref={inputRef} className="w-full px-4 py-3 pr-12 rounded-xl border border-white/[0.08] text-[13px] bg-white/[0.03] text-white resize-none placeholder:text-white/15 focus:border-brand-500/30 focus:ring-2 focus:ring-brand-500/10 min-h-[48px] max-h-[160px]" placeholder={mode==='employee'?"Ask about your goals, promotion case, craft skills, development...":"Ask about your team, draft feedback, prep 1:1s, assess readiness..."} value={input} onChange={e=>{setInput(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,160)+'px';}} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} rows={1}/>
              <button onClick={()=>send()} disabled={loading||!input.trim()} className="absolute right-2 bottom-2 w-8 h-8 rounded-lg bg-brand-500 text-white flex items-center justify-center hover:bg-brand-600 transition-colors disabled:opacity-20"><I name="send" size={14}/></button>
            </div>
          </div>
          <p className="text-[10px] text-white/10 mt-2.5 text-center">{mode==='employee'?`${ME.personalGoals.length} goals · ${ME.promoReadiness}% Director readiness · ${Object.keys(ME.skills).length} craft pillars`:`${TEAM.length} reports · ${TEAM.reduce((a,t)=>a+t.goals.length,0)} team goals · ${RISKS.length} active risks`}</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
